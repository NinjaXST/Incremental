<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woodland</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }
        body {
            background: #0d0a07;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            user-select: none;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            height: 100%;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            flex: 1 1 0;
            min-height: 0;
            border-bottom: 3px solid #4a2e10;
            image-rendering: pixelated;
            cursor: default;
        }

        /* ── HUD ── */
        #hud {
            flex-shrink: 0;
            background: #0d0a07;
            color: #c8a450;
            font-size: clamp(11px, 3vw, 15px);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #8B6320;
            text-align: center;
            padding: 5px 0;
            border-bottom: 2px solid #2a1508;
            display: flex;
            justify-content: center;
            gap: 18px;
        }
        #hud span { color: #e8d090; }
        #food-hud { color: #c8a450; }
        #food-hud.hidden { display: none; }
        #food-hud span { color: #e8d090; }

        /* ── Tab bar ── */
        #tab-bar {
            flex-shrink: 0;
            display: flex;
            border-bottom: 2px solid #3a1e08;
            background: #080604;
        }
        .tab-btn {
            flex: 1;
            padding: 6px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(10px, 2.6vw, 13px);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #4a3520;
            background: #080604;
            border: none;
            border-right: 1px solid #221408;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active { color: #c8a450; background: #100a04; text-shadow: 0 0 8px #8B6320; }
        .tab-btn:hover:not(.active) { color: #7a6040; }

        /* ── Upgrade panel ── */
        #upgrade-panel {
            flex-shrink: 0;
            background: #080604;
            border-top: 3px solid #4a2e10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            color: #c8a450;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 900;
            letter-spacing: 5px;
            text-align: center;
            padding: 6px 0;
            border-bottom: 2px solid #3a1e08;
            background: #100a04;
            text-shadow: 0 0 8px #8B6320;
            flex-shrink: 0;
        }
        #tab-wood {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        #tab-wood.hidden { display: none; }
        .cards-row {
            display: flex;
            flex-direction: row;
            flex: 1;
            border-bottom: 1px solid #1a0d05;
        }
        .cards-row:last-child { border-bottom: none; }

        .upg-card {
            border-right: 1px solid #221408;
            padding: clamp(6px, 2vw, 12px) clamp(5px, 1.5vw, 9px);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: background 0.1s;
            min-width: 0;
        }
        .upg-card:last-child { border-right: none; }
        .upg-card.affordable { cursor: pointer; }
        .upg-card.affordable:hover,
        .upg-card.affordable:active { background: #130d06; }
        .upg-card.broke { cursor: default; }
        .upg-card.maxed { cursor: default; opacity: 0.45; }

        .upg-name {
            color: #c8a450;
            font-size: clamp(10px, 2.8vw, 14px);
            font-weight: 900;
            letter-spacing: 0.5px;
            line-height: 1.25;
            word-break: break-word;
        }
        .upg-effect {
            color: #7a9860;
            font-size: clamp(10px, 2.6vw, 13px);
            font-weight: bold;
            line-height: 1.4;
            flex: 1;
        }
        .upg-next {
            color: #506840;
            font-size: clamp(9px, 2.3vw, 11px);
            font-weight: bold;
        }
        .upg-lvl-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .upg-lvlbar-bg {
            flex: 1;
            height: 6px;
            background: #1e1108;
            border: 1px solid #3a1e08;
        }
        .upg-lvlbar-fill {
            height: 100%;
            background: #7a5018;
            transition: width 0.2s;
        }
        .upg-lvl-text {
            color: #6a5030;
            font-size: clamp(9px, 2.3vw, 11px);
            font-weight: bold;
            white-space: nowrap;
        }
        .upg-cost-row {
            font-size: clamp(10px, 2.8vw, 14px);
            font-weight: 900;
            letter-spacing: 0.3px;
            padding: clamp(5px, 1.5vw, 8px) 3px;
            border: 1px solid #3a1e08;
            text-align: center;
        }
        .affordable .upg-cost-row { color: #6DC040; border-color: #3a6020; background: #0d1808; }
        .affordable:hover .upg-cost-row,
        .affordable:active .upg-cost-row { background: #122010; }
        .broke .upg-cost-row { color: #4a3520; border-color: #2a1508; }
        .maxed .upg-cost-row { color: #3a2810; border-color: #221408; }

        /* ── Farm tab ── */
        #tab-farm {
            display: none;
            flex-direction: column;
        }
        #tab-farm.active { display: flex; }

        /* ── Save indicator ── */
        #save-indicator {
            position: fixed;
            top: 8px;
            right: 10px;
            color: #6DC040;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #3a8020;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        #save-indicator.show { opacity: 1; }

        /* ── Title screen ── */
        #title-screen {
            position: fixed;
            inset: 0;
            background: #0d0a07;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #title-screen.hidden { display: none; }
        #title-logo {
            color: #c8a450;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(36px, 10vw, 64px);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 30px #8B6320, 0 0 60px #5a3a10;
            margin-bottom: 8px;
        }
        #title-tagline {
            color: #6a5030;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(10px, 2.8vw, 14px);
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 52px;
        }
        .title-btn {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            width: clamp(220px, 55vw, 300px);
            padding: 14px 0;
            margin-bottom: 14px;
            font-size: clamp(13px, 3.5vw, 16px);
            transition: background 0.1s, color 0.1s;
        }
        #btn-resume {
            background: #0d1808;
            color: #6DC040;
            border: 2px solid #3a6020;
        }
        #btn-resume:hover, #btn-resume:active { background: #122010; color: #8ae050; }
        #btn-new {
            background: #100a04;
            color: #c8a450;
            border: 2px solid #4a2e10;
        }
        #btn-new:hover, #btn-new:active { background: #1a1008; color: #e8c060; }
        #btn-resume.hidden { display: none; }

        /* ── Confirm overlay ── */
        #confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        #confirm-overlay.hidden { display: none; }
        #confirm-box {
            background: #0d0a07;
            border: 2px solid #4a2e10;
            padding: 28px 24px 20px;
            max-width: clamp(260px, 80vw, 360px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #confirm-title {
            color: #c8a450;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(13px, 3.5vw, 16px);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        #confirm-msg {
            color: #7a6040;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(11px, 2.8vw, 13px);
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.6;
            margin-bottom: 6px;
        }
        .confirm-btn {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 12px 0;
            font-size: clamp(12px, 3vw, 14px);
            transition: background 0.1s;
        }
        #confirm-yes {
            background: #1a0808;
            color: #d04030;
            border: 2px solid #6a2018;
            margin-bottom: 8px;
        }
        #confirm-yes:hover { background: #220a0a; color: #e85040; }
        #confirm-no {
            background: #100a04;
            color: #c8a450;
            border: 2px solid #4a2e10;
        }
        #confirm-no:hover { background: #1a1008; }
    </style>
</head>
<body>
    <!-- Title screen -->
    <div id="title-screen">
        <div id="title-logo">WOODLAND</div>
        <div id="title-tagline">A woodland idle game</div>
        <button class="title-btn" id="btn-resume">&#9658; Resume Game</button>
        <button class="title-btn" id="btn-new">&#9658; New Game</button>
    </div>

    <!-- Overwrite warning -->
    <div id="confirm-overlay" class="hidden">
        <div id="confirm-box">
            <div id="confirm-title">&#9888; Overwrite Save?</div>
            <div id="confirm-msg">You have an existing save.<br>Starting a new game will erase it permanently.</div>
            <button class="confirm-btn" id="confirm-yes">&#9658; Erase &amp; Start New</button>
            <button class="confirm-btn" id="confirm-no">&#9654; Cancel</button>
        </div>
    </div>

    <div id="save-indicator">SAVED</div>
    <div id="wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Wood: <span id="woodCount">0</span></div>
            <div id="food-hud" class="hidden">Food: <span id="foodCount">0</span></div>
        </div>
        <div id="upgrade-panel">
            <div id="tab-bar">
                <button class="tab-btn active" id="tab-wood-btn">FOREST</button>
                <button class="tab-btn" id="tab-farm-btn" style="display:none">FARM</button>
            </div>
            <div id="tab-wood">
                <div class="cards-row">
                    <div id="upg-0" class="upg-card"></div>
                    <div id="upg-1" class="upg-card"></div>
                    <div id="upg-2" class="upg-card"></div>
                    <div id="upg-3" class="upg-card"></div>
                </div>
                <div class="cards-row">
                    <div id="upg-4" class="upg-card"></div>
                    <div id="upg-5" class="upg-card"></div>
                    <div id="upg-6" class="upg-card"></div>
                    <div id="upg-7" class="upg-card"></div>
                </div>
            </div>
            <div id="tab-farm">
                <div class="cards-row">
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                </div>
                <div class="cards-row">
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                    <div class="upg-card maxed"><div class="upg-name">—</div><div class="upg-cost-row">LOCKED</div></div>
                </div>
            </div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS & DYNAMIC DIMENSIONS
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const P = 8; // pixel-art cell size

let W, H, GROUND;
let STARS = [];
let BG_TREES = [];

function resizeCanvas() {
    const wrapper  = document.getElementById('wrapper');
    const hud      = document.getElementById('hud');
    const panel    = document.getElementById('upgrade-panel');
    const wrapRect = wrapper.getBoundingClientRect();
    const hudH     = hud.getBoundingClientRect().height;
    const panelH   = panel.getBoundingClientRect().height;

    W = Math.round(wrapRect.width)  || window.innerWidth  || 390;
    H = Math.round(wrapRect.height - hudH - panelH) || Math.round(window.innerHeight * 0.55);

    canvas.width  = W;
    canvas.height = H;

    GROUND = Math.round(H * 0.72);

    STARS = Array.from({ length: 55 }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * Math.max(GROUND - 80, 20),
        s:  Math.random() < 0.25 ? 2 : 1,
        tw: Math.random() * Math.PI * 2,
    }));

    BG_TREES = [
        { x: Math.round(W * 0.07), h: 48 },
        { x: Math.round(W * 0.18), h: 36 },
        { x: Math.round(W * 0.29), h: 55 },
        { x: Math.round(W * 0.71), h: 50 },
        { x: Math.round(W * 0.82), h: 38 },
        { x: Math.round(W * 0.93), h: 44 },
    ];
}

// ═══════════════════════════════════════════════════════════════
//  PIXEL ART TREES
// ═══════════════════════════════════════════════════════════════
const TREE_ART = [
    // 0 – Seed / tiny sprout  (5 wide, 4 tall)
    ['  H  ',
     ' LHL ',
     '  T  ',
     ' KTK '],

    // 1 – Small bush  (7 wide, 6 tall)
    ['  HLH  ',
     ' HLMLH ',
     'HLMMMLH',
     'LMMMMML',
     ' DDDDD ',
     '  KTK  '],

    // 2 – Young tree  (9 wide, 10 tall)
    ['    H    ',
     '  HLHLH  ',
     ' HLMMMHL ',
     'HLMMBMMHL',
     'LMMMMMMML',
     'LMMMBMMML',
     ' DMMMMMD ',
     '  DDDDD  ',
     '   KTK   ',
     '  KKTKK  '],

    // 3 – Full grown tree  (13 wide, 13 tall)
    ['      H      ',
     '    HLHLH    ',
     '   HLMMLHH   ',
     '  HLMMMMLHH  ',
     ' HLMMBMMBMLH ',
     'HLMMMMMMMMMHL',
     'LMMMMBMMMMMML',
     'LMMMMMMMMMMML',
     ' DMMMMMMMMMD ',
     '  DDDDDDDDD  ',
     '     KTK     ',
     '    KTTTK    ',
     '  KKKTTTKKK  '],
];

// Fruit tree: stage 3 with red apples scattered through mid-canopy
const FRUIT_TREE_ART = (() => {
    const base = TREE_ART[3];
    // [row, col, char] replacements — only on 'M' cells
    const subs = [
        [3, 6, 'A'], // apple in upper canopy
        [4, 4, 'A'], [4, 9, 'a'],
        [5, 6, 'A'], [5, 9, 'a'],
        [6, 2, 'A'], [6, 8, 'a'],
        [7, 5, 'A'], [7, 10, 'a'],
    ];
    return base.map((row, r) => {
        const chars = row.split('');
        for (const [sr, sc, ch] of subs) {
            if (sr === r && chars[sc] === 'M') chars[sc] = ch;
        }
        return chars.join('');
    });
})();

const PALETTE = {
    ' ': null,
    T: '#8C5C28',
    K: '#3E1E08',
    B: '#6A3A10',
    H: '#8ED040',
    L: '#52A022',
    M: '#2A6810',
    D: '#144008',
    A: '#C02020',   // apple bright red
    a: '#801010',   // apple dark shadow
};

// ═══════════════════════════════════════════════════════════════
//  UPGRADES
// ═══════════════════════════════════════════════════════════════
const DEEP_ROOTS_COSTS = [1, 2, 3, 5, 7, 10, 15, 22, 35, 55];

const UPGRADES = [
    // 0 – Sharp Axe
    {
        id: 'chops', name: 'SHARP AXE', maxLevel: 5, level: 0,
        currency: 'wood',
        cost() { return this.level + 1; },
        effectText() {
            const cur = 10 - this.level;
            if (this.level >= this.maxLevel) return `Chops: ${cur}`;
            return `Chops: ${cur}\n▸ ${cur - 1} (−1)`;
        },
    },
    // 1 – Deep Roots (faster early scaling)
    {
        id: 'growSpeed', name: 'DEEP ROOTS', maxLevel: 10, level: 0,
        currency: 'wood',
        cost() { return DEEP_ROOTS_COSTS[this.level] ?? 99999; },
        growTimeAt(lvl) {
            if (lvl === 0) return 5000;
            if (lvl >= this.maxLevel) return 2500;
            // Interpolate so lvl 10 lands exactly at 2500ms
            return Math.round(5000 - 2500 * (1 - Math.pow(0.72, lvl)));
        },
        effectText() {
            const cur = (this.growTimeAt(this.level) / 1000).toFixed(1);
            if (this.level >= this.maxLevel) return `Grow: ${cur}s`;
            const nxt  = (this.growTimeAt(this.level + 1) / 1000).toFixed(1);
            const diff = ((this.growTimeAt(this.level) - this.growTimeAt(this.level + 1)) / 1000).toFixed(2);
            return `Grow: ${cur}s\n▸ ${nxt}s (−${diff}s)`;
        },
    },
    // 2 – Rich Gains (gentler cost curve)
    {
        id: 'woodYield', name: 'RICH GAINS', maxLevel: 10, level: 0,
        currency: 'wood',
        costBase: 2, costMult: 1.65,
        cost() { return Math.ceil(this.costBase * Math.pow(this.costMult, this.level)); },
        multiplier() { return Math.pow(1.5, this.level); },
        effectText() {
            const cur = this.multiplier().toFixed(2);
            if (this.level >= this.maxLevel) return `Yield: ×${cur}`;
            const nxt = Math.pow(1.5, this.level + 1).toFixed(2);
            return `Yield: ×${cur}\n▸ ×${nxt} (+50%)`;
        },
    },
    // 3 – Plant Tree (gentler cost curve)
    {
        id: 'trees', name: 'PLANT TREE', maxLevel: 4, level: 0,
        currency: 'wood',
        costBase: 3, costMult: 2.2,
        cost() { return Math.ceil(this.costBase * Math.pow(this.costMult, this.level)); },
        effectText() {
            const cur = 1 + this.level;
            if (this.level >= this.maxLevel) return `Trees: ${cur} (max)`;
            return `Trees: ${cur}\n▸ ${cur + 1} trees`;
        },
    },
    // 4 – Fructify
    {
        id: 'fructify', name: 'FRUCTIFY', maxLevel: 5, level: 0,
        currency: 'wood',
        costBase: 10, costMult: 2.2,
        cost() { return Math.ceil(this.costBase * Math.pow(this.costMult, this.level)); },
        fruitChance() { return this.level * 0.2; },
        effectText() {
            const cur = (this.fruitChance() * 100).toFixed(0);
            if (this.level >= this.maxLevel) return `Fruit: ${cur}%`;
            return `Fruit: ${cur}%\n▸ ${(this.level + 1) * 20}% chance`;
        },
    },
    // 5 – Forester's Lodge (auto-chop)
    {
        id: 'lodge', name: "FORESTER'S LODGE", maxLevel: 10, level: 0,
        currency: 'wood',
        costBase: 10, costMult: 1.7,
        cost() { return Math.ceil(this.costBase * Math.pow(this.costMult, this.level)); },
        clicksPerSec() { return this.level; },
        effectText() {
            const cur = this.clicksPerSec();
            if (this.level === 0) return `Auto-Chop: 0/s\n▸ 1/s`;
            if (this.level >= this.maxLevel) return `Auto-Chop: ${cur}/s`;
            return `Auto-Chop: ${cur}/s\n▸ ${cur + 1}/s`;
        },
    },
    // 6 – Selective Breeding (costs Food)
    {
        id: 'breeding', name: 'SELECTIVE BREEDING', maxLevel: 10, level: 0,
        currency: 'food',
        costBase: 3, costMult: 1.7,
        cost() { return Math.ceil(this.costBase * Math.pow(this.costMult, this.level)); },
        multiplier() { return Math.pow(1.5, this.level); },
        effectText() {
            const cur = this.multiplier().toFixed(2);
            if (this.level >= this.maxLevel) return `Food×: ${cur}`;
            const nxt = Math.pow(1.5, this.level + 1).toFixed(2);
            return `Food×: ${cur}\n▸ ×${nxt} (+50%)`;
        },
    },
    // 7 – Build Farm (one-time, mixed cost)
    {
        id: 'farm', name: 'BUILD FARM', maxLevel: 1, level: 0,
        currency: 'mixed',
        woodCost: 0, foodCost: 0,
        cost() { return this.woodCost; },
        effectText() {
            if (this.level >= this.maxLevel) return 'Farm: Open';
            return 'Unlock\nFarm tab';
        },
    },
];

function getGrowTime()       { return UPGRADES[1].growTimeAt(UPGRADES[1].level); }
function getClicksNeeded()   { return 10 - UPGRADES[0].level; }
function getWoodMultiplier() { return UPGRADES[2].multiplier(); }
function getFoodMultiplier() { return UPGRADES[6].multiplier(); }
function getFruitChance()    { return UPGRADES[4].fruitChance(); }
function getLodgeCPS()       { return UPGRADES[5].clicksPerSec(); }
function formatNum(n)        { return Number.isInteger(n) ? n : n.toFixed(2); }

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
function makeTree() {
    return { growth: 0, grown: false, clicks: 0, hasFruit: false,
             shakeTimer: 0, shakeX: 0, readyPing: false };
}

function makePlot() {
    return { growth: 0, grown: false, readyPing: false };
}

const game = {
    wood: 0, food: 0,
    trees: [makeTree()],
    firstChopDone: false, lodgeAccum: 0,
    farm: { plots: [makePlot()] },
};

// ═══════════════════════════════════════════════════════════════
//  PARTICLES & FLOATS
// ═══════════════════════════════════════════════════════════════
const particles = [];
function spawnChips(x, y) {
    for (let i = 0; i < 7; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 5,
            vy: -Math.random() * 6 - 1,
            life: 1,
            color: ['#7B4A1E','#A0602A','#C87A38'][Math.floor(Math.random() * 3)],
            size: (Math.floor(Math.random() * 3) + 1) * 2,
        });
    }
}

const floats = [];
function spawnFloat(x, y, text, color) {
    floats.push({ x, y, text, color, life: 1 });
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function getStage(growth) {
    if (growth < 0.20) return 0;
    if (growth < 0.50) return 1;
    if (growth < 0.85) return 2;
    return 3;
}

function getArt(tree) {
    const stage = getStage(tree.growth);
    if (stage === 3 && tree.hasFruit) return FRUIT_TREE_ART;
    return TREE_ART[stage];
}

function treeCenters() {
    const n = game.trees.length;
    // Reserve right zone for cabin when lodge is active
    const hasLodge = UPGRADES[5].level > 0;
    const rightMargin = hasLodge ? Math.round(W * 0.24) : 0;
    const availW = W - rightMargin;
    return Array.from({ length: n }, (_, i) => Math.round(availW * (i + 1) / (n + 1)));
}

function treeRect(cx, tree) {
    const art  = getArt(tree);
    const cols = art[0].length;
    const rows = art.length;
    const ox   = Math.round(cx - (cols / 2) * P) + (tree.shakeTimer > 0 ? Math.round(tree.shakeX) : 0);
    return { ox, oy: GROUND - rows * P, cols, rows };
}

function hitTest(mx, my, cx, tree) {
    const { ox, oy, cols, rows } = treeRect(cx, tree);
    return mx >= ox && mx <= ox + cols * P && my >= oy && my <= oy + rows * P;
}

// ═══════════════════════════════════════════════════════════════
//  DAY / NIGHT CYCLE
// ═══════════════════════════════════════════════════════════════
const DAY_DURATION = 90000;

const CLOUDS = Array.from({ length: 5 }, (_, i) => ({
    xFrac: i / 5 + Math.random() * 0.15,
    y:     0,
    w:     60 + Math.random() * 60,
    h:     14 + Math.random() * 10,
    speed: 0.000018 + Math.random() * 0.00001,
}));

function initClouds() {
    for (const c of CLOUDS) c.y = Math.round(GROUND * (0.12 + Math.random() * 0.25));
}

function lerpColor(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr},${rg},${rb})`;
}

const SKY_KEYS = [
    [0.00, '#0a0e1a', '#0d1520'],
    [0.20, '#1a1030', '#2a1525'],
    [0.25, '#e8602a', '#f0a050'],
    [0.33, '#5090d0', '#7ab8e8'],
    [0.50, '#2060c8', '#50a0e8'],
    [0.67, '#4878c0', '#80b0e0'],
    [0.75, '#e05020', '#f08030'],
    [0.80, '#1a1030', '#2a1525'],
    [1.00, '#0a0e1a', '#0d1520'],
];

function getSkyColors(dayT) {
    for (let i = 0; i < SKY_KEYS.length - 1; i++) {
        const [t0, top0, bot0] = SKY_KEYS[i];
        const [t1, top1, bot1] = SKY_KEYS[i + 1];
        if (dayT >= t0 && dayT <= t1) {
            const f = (dayT - t0) / (t1 - t0);
            return [lerpColor(top0, top1, f), lerpColor(bot0, bot1, f)];
        }
    }
    return ['#0a0e1a', '#0d1520'];
}

function daylight(dayT) {
    if (dayT < 0.2 || dayT > 0.8) return 0;
    const t = (dayT - 0.2) / 0.6;
    return Math.sin(t * Math.PI);
}

function arcPos(angle) {
    const cx = W / 2;
    const rx = W * 0.6;
    const ry = GROUND * 0.88;
    return {
        x: cx + rx * Math.cos(Math.PI - angle),
        y: GROUND - ry * Math.sin(angle),
    };
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════
function drawBackground(ts) {
    const dayT = (ts % DAY_DURATION) / DAY_DURATION;
    const dl   = daylight(dayT);

    const [topCol, botCol] = getSkyColors(dayT);
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
    sky.addColorStop(0, topCol);
    sky.addColorStop(1, botCol);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND);

    const starAlpha = 1 - dl;
    if (starAlpha > 0.01) {
        for (const s of STARS) {
            ctx.globalAlpha = starAlpha * (0.5 + 0.5 * Math.sin(ts / 1800 + s.tw));
            ctx.fillStyle = '#e8dfc0';
            ctx.fillRect(Math.round(s.x), Math.round(s.y), s.s, s.s);
        }
        ctx.globalAlpha = 1;
    }

    const moonPhase = ((dayT + 0.25) % 1.0);
    const moonAngle = moonPhase * Math.PI;
    const moonAlpha = Math.max(0, 1 - dl * 3);
    if (moonAngle > 0.05 && moonAngle < Math.PI - 0.05 && moonAlpha > 0.01) {
        const { x: moonX, y: moonY } = arcPos(moonAngle);
        ctx.globalAlpha = moonAlpha;
        ctx.fillStyle = '#e8dfc0';
        ctx.beginPath(); ctx.arc(moonX, moonY, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = topCol;
        ctx.beginPath(); ctx.arc(moonX - 6, moonY - 4, 11, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    const sunAngle = (dayT - 0.25) * Math.PI / 0.5;
    if (sunAngle > 0.02 && sunAngle < Math.PI - 0.02) {
        const { x: sunX, y: sunY } = arcPos(sunAngle);
        const sunR = 18;
        const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 3);
        glow.addColorStop(0, 'rgba(255,220,80,0.5)');
        glow.addColorStop(1, 'rgba(255,160,20,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe050';
        ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff8a0';
        ctx.beginPath(); ctx.arc(sunX - 4, sunY - 4, sunR * 0.55, 0, Math.PI * 2); ctx.fill();
    }

    if (dl > 0.05) {
        for (const c of CLOUDS) {
            c.xFrac = (c.xFrac + c.speed * 16) % 1.2;
            if (c.xFrac > 1.15) c.xFrac = -0.1;
            const cx2 = c.xFrac * W;
            ctx.globalAlpha = dl * 0.75;
            ctx.fillStyle = '#ffffff';
            const cw = c.w, ch = c.h;
            ctx.beginPath();
            ctx.ellipse(cx2,            c.y,           cw * 0.45, ch * 0.6, 0, 0, Math.PI * 2);
            ctx.ellipse(cx2 + cw * 0.3, c.y - ch * 0.2, cw * 0.35, ch * 0.7, 0, 0, Math.PI * 2);
            ctx.ellipse(cx2 - cw * 0.3, c.y + ch * 0.1, cw * 0.3,  ch * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    // Background silhouette trees — skip cabin zone when lodge active
    const cabinZoneX = UPGRADES[5].level > 0 ? Math.round(W * 0.73) : W + 1;
    const treeCol = dl < 0.3 ? '#101810' : '#182818';
    ctx.fillStyle = treeCol;
    for (const bt of BG_TREES) {
        if (bt.x >= cabinZoneX) continue;
        ctx.fillRect(bt.x - 13, GROUND - bt.h, 26, bt.h - 10);
        ctx.fillRect(bt.x - 3,  GROUND - 11,   6,  11);
    }

    const gndTop = dl > 0.5 ? '#3a2010' : '#2a1a0a';
    const gnd = ctx.createLinearGradient(0, GROUND, 0, H);
    gnd.addColorStop(0, gndTop);
    gnd.addColorStop(1, '#1a0d05');
    ctx.fillStyle = gnd;
    ctx.fillRect(0, GROUND, W, H - GROUND);

    const grassTop = dl > 0.5 ? '#3a8228' : '#2d6b20';
    const grassBot = dl > 0.5 ? '#2e7020' : '#245c18';
    ctx.fillStyle = grassTop; ctx.fillRect(0, GROUND,     W, P);
    ctx.fillStyle = grassBot; ctx.fillRect(0, GROUND + P, W, P);

    ctx.fillStyle = dl > 0.5 ? '#4a9830' : '#3a8828';
    for (let gx = 16; gx < W; gx += 48) {
        ctx.fillRect(gx,      GROUND - P,     P,   P);
        ctx.fillRect(gx + 18, GROUND - P + 2, P-1, P-1);
        ctx.fillRect(gx + 34, GROUND - P,     P-1, P);
    }
}

function drawCabin(ts) {
    if (UPGRADES[5].level === 0) return;

    const cabinStartX = Math.round(W * 0.75);
    const cabinW      = Math.round(W * 0.22);
    const cabinH      = Math.round(cabinW * 0.75);
    const baseY       = GROUND;
    const wallTopY    = baseY - cabinH;
    const logH        = Math.max(3, Math.round(cabinH / 8));

    // Log walls
    const logColors = ['#5a3212', '#6a3c1a', '#4a2808', '#623618'];
    for (let i = 0; i < Math.ceil(cabinH / logH); i++) {
        ctx.fillStyle = logColors[i % logColors.length];
        ctx.fillRect(cabinStartX, wallTopY + i * logH, cabinW, Math.max(1, logH - 1));
    }

    // Roof
    ctx.fillStyle = '#2a1608';
    ctx.beginPath();
    ctx.moveTo(cabinStartX - 4, wallTopY + 2);
    ctx.lineTo(cabinStartX + cabinW / 2, wallTopY - Math.round(cabinW * 0.35));
    ctx.lineTo(cabinStartX + cabinW + 4, wallTopY + 2);
    ctx.closePath();
    ctx.fill();
    // Roof ridge detail
    ctx.fillStyle = '#1a0e05';
    ctx.fillRect(cabinStartX + Math.round(cabinW / 2) - 2, wallTopY - Math.round(cabinW * 0.35), 4, Math.round(cabinW * 0.1));

    // Chimney
    const chimneyX = cabinStartX + Math.round(cabinW * 0.68);
    const chimneyH = Math.round(cabinW * 0.28);
    ctx.fillStyle = '#2a1808';
    ctx.fillRect(chimneyX, wallTopY - Math.round(cabinW * 0.35) - chimneyH + 10, 9, chimneyH);
    // Smoke puff
    const smokeAlpha = 0.25 + 0.15 * Math.sin(ts / 700);
    ctx.globalAlpha = smokeAlpha;
    ctx.fillStyle = '#b0a898';
    ctx.beginPath();
    ctx.arc(chimneyX + 5, wallTopY - Math.round(cabinW * 0.35) - chimneyH + 6, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Door
    const doorW = Math.round(cabinW * 0.22);
    const doorH = Math.round(cabinH * 0.44);
    const doorX = cabinStartX + Math.round((cabinW - doorW) / 2);
    ctx.fillStyle = '#1a0d05';
    ctx.fillRect(doorX, baseY - doorH, doorW, doorH);
    // Door frame
    ctx.strokeStyle = '#3a1e08';
    ctx.lineWidth = 1;
    ctx.strokeRect(doorX, baseY - doorH, doorW, doorH);

    // Window (left side)
    const winSize = Math.round(cabinW * 0.18);
    const winX    = cabinStartX + Math.round(cabinW * 0.08);
    const winY    = wallTopY + Math.round(cabinH * 0.22);
    // Warm glow flicker
    const glow = 0.4 + 0.25 * Math.sin(ts / 900);
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#d8901a';
    ctx.fillRect(winX, winY, winSize, winSize);
    ctx.globalAlpha = 1;
    // Window pane cross
    ctx.fillStyle = '#2a1508';
    ctx.fillRect(winX, winY + Math.round(winSize / 2) - 1, winSize, 2);
    ctx.fillRect(winX + Math.round(winSize / 2) - 1, winY, 2, winSize);

    // Lodge level badge
    const lvl = UPGRADES[5].level;
    const fSize = Math.max(9, Math.round(cabinW * 0.13));
    ctx.fillStyle = '#c8a450';
    ctx.font = `bold ${fSize}px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.fillText(`LVL ${lvl}`, cabinStartX + cabinW / 2, wallTopY - Math.round(cabinW * 0.42));
}

function drawOneTree(ts, cx, tree) {
    const { ox, oy, cols, rows } = treeRect(cx, tree);
    const art = getArt(tree);

    if (tree.grown) {
        ctx.shadowColor = tree.hasFruit ? '#e05020' : '#6DC040';
        ctx.shadowBlur  = (0.4 + 0.2 * Math.sin(ts / 350)) * 18;
    }
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < art[r].length; c++) {
            const col = PALETTE[art[r][c]];
            if (!col) continue;
            ctx.fillStyle = col;
            ctx.fillRect(ox + c * P, oy + r * P, P, P);
        }
    }
    ctx.shadowBlur = 0;
}

function drawAllTrees(ts) {
    const centers = treeCenters();
    for (let i = 0; i < game.trees.length; i++) {
        drawOneTree(ts, centers[i], game.trees[i]);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawFloats() {
    ctx.textAlign = 'center';
    for (const f of floats) {
        ctx.globalAlpha = f.life;
        ctx.fillStyle   = f.color;
        ctx.font        = 'bold 13px "Courier New"';
        ctx.fillText(f.text, f.x, Math.round(f.y));
    }
    ctx.globalAlpha = 1;
}

function drawUI(ts) {
    const centers      = treeCenters();
    const clicksNeeded = getClicksNeeded();
    const barW  = Math.max(55, Math.min(130, Math.floor(W * (UPGRADES[5].level > 0 ? 0.72 : 0.9) / game.trees.length) - 18));
    const barH  = Math.round(Math.max(8, Math.min(14, W * 0.025)));
    const fSize = Math.round(Math.max(10, Math.min(16, W * 0.03)));
    const by    = GROUND + Math.round(H * 0.04);

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];
        const bx   = Math.round(cx - barW / 2);

        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
        ctx.fillStyle = '#2a1508';
        ctx.fillRect(bx, by, barW, barH);

        ctx.font      = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';

        if (!tree.grown) {
            const fill = tree.growth * barW;
            if (fill > 0) {
                ctx.fillStyle = '#2d6b20'; ctx.fillRect(bx, by, fill, barH);
                if (fill > 3) { ctx.fillStyle = '#3a8828'; ctx.fillRect(bx, by, fill - 2, barH - 3); }
            }
            const secsLeft = ((1 - tree.growth) * getGrowTime() / 1000).toFixed(1);
            ctx.fillStyle = '#6a5030';
            ctx.fillText(`${secsLeft}s`, cx, by + barH + fSize + 2);
        } else {
            const fill = (tree.clicks / clicksNeeded) * barW;
            if (fill > 0) {
                ctx.fillStyle = '#7B4A1E'; ctx.fillRect(bx, by, fill, barH);
                if (fill > 3) { ctx.fillStyle = '#A0602A'; ctx.fillRect(bx, by, fill - 2, barH - 3); }
            }
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${tree.clicks}/${clicksNeeded}`, cx, by + barH + fSize + 2);

            const art  = getArt(tree);
            const topY = GROUND - art.length * P - 8;
            const pulse = 0.6 + 0.4 * Math.sin(ts / 350);
            ctx.globalAlpha = pulse;
            // Arrow colour: orange tint if tree has fruit
            ctx.fillStyle = tree.hasFruit ? '#e07020' : '#6DC040';
            ctx.font      = `bold ${fSize + 4}px "Courier New"`;
            ctx.fillText('▼', cx, topY);

            if (tree.hasFruit) {
                ctx.fillStyle = '#e07020';
                ctx.font = `bold ${fSize}px "Courier New"`;
                ctx.fillText('FRUIT!', cx, topY - fSize - 2);
            }

            if (!game.firstChopDone) {
                ctx.fillStyle = '#ffe080';
                ctx.font = `bold ${fSize + 4}px "Courier New"`;
                ctx.fillText('TAP TO CHOP!', cx, topY - fSize - 6);
            }
            ctx.globalAlpha = 1;
        }
    }

    // Update HUD
    document.getElementById('woodCount').textContent = formatNum(game.wood);
    if (UPGRADES[4].level > 0 || game.food > 0) {
        document.getElementById('food-hud').classList.remove('hidden');
        document.getElementById('foodCount').textContent = formatNum(game.food);
    }
}

// ═══════════════════════════════════════════════════════════════
//  UPGRADE PANEL (DOM)
// ═══════════════════════════════════════════════════════════════
function buildCard(i) {
    const u     = UPGRADES[i];
    const atMax = u.level >= u.maxLevel;
    const pct   = (u.level / u.maxLevel * 100).toFixed(1);
    const lines = u.effectText().split('\n');
    const el    = document.getElementById(`upg-${i}`);
    if (!el) return;

    let costHtml;
    if (atMax) {
        costHtml = '— MAXED —';
    } else if (u.currency === 'mixed') {
        costHtml = `▶ ${u.woodCost}W+${u.foodCost}F`;
    } else if (u.currency === 'food') {
        costHtml = `▶ ${u.cost()} FOOD`;
    } else {
        costHtml = `▶ ${u.cost()} WOOD`;
    }

    el.innerHTML = `
        <div class="upg-name">${u.name}</div>
        <div class="upg-effect">${lines[0]}${lines[1] ? `<br><span class="upg-next">${lines[1]}</span>` : ''}</div>
        <div class="upg-lvl-row">
            <div class="upg-lvlbar-bg">
                <div class="upg-lvlbar-fill" style="width:${pct}%"></div>
            </div>
            <div class="upg-lvl-text">${atMax ? 'MAX' : `${u.level}/${u.maxLevel}`}</div>
        </div>
        <div class="upg-cost-row" id="upg-cost-${i}">${costHtml}</div>`;
}

function buildPanel() {
    for (let i = 0; i < UPGRADES.length; i++) {
        const el = document.getElementById(`upg-${i}`);
        if (el) el.addEventListener('click', () => buyUpgrade(i));
        buildCard(i);
    }
    // Wire tab buttons
    document.getElementById('tab-wood-btn').addEventListener('click', () => switchTab('wood'));
    document.getElementById('tab-farm-btn').addEventListener('click', () => switchTab('farm'));
    syncPanel();
}

function syncPanel() {
    for (let i = 0; i < UPGRADES.length; i++) {
        const u     = UPGRADES[i];
        const atMax = u.level >= u.maxLevel;
        let afford  = false;
        let costText = '';

        if (!atMax) {
            if (u.currency === 'wood') {
                const c = u.cost();
                afford   = game.wood >= c;
                costText = `▶ ${c} WOOD`;
            } else if (u.currency === 'food') {
                const c = u.cost();
                afford   = game.food >= c;
                costText = `▶ ${c} FOOD`;
            } else if (u.currency === 'mixed') {
                afford   = game.wood >= u.woodCost && game.food >= u.foodCost;
                costText = `▶ ${u.woodCost}W+${u.foodCost}F`;
            }
        }

        const el = document.getElementById(`upg-${i}`);
        if (!el) continue;
        el.className = 'upg-card ' + (atMax ? 'maxed' : afford ? 'affordable' : 'broke');

        const costEl = document.getElementById(`upg-cost-${i}`);
        if (costEl && !atMax && costText) costEl.textContent = costText;
    }
}

function buyUpgrade(idx) {
    const u = UPGRADES[idx];
    if (u.level >= u.maxLevel) return;

    // Check & deduct cost
    if (u.currency === 'wood') {
        const c = u.cost();
        if (game.wood < c) return;
        game.wood -= c;
    } else if (u.currency === 'food') {
        const c = u.cost();
        if (game.food < c) return;
        game.food -= c;
    } else if (u.currency === 'mixed') {
        if (game.wood < u.woodCost || game.food < u.foodCost) return;
        game.wood -= u.woodCost;
        game.food -= u.foodCost;
    }

    u.level++;

    if (u.id === 'trees') {
        game.trees.push(makeTree());
        spawnFloat(W / 2, GROUND * 0.15, '✦ NEW TREE PLANTED ✦', '#6DC040');
    }
    if (u.id === 'farm') {
        document.getElementById('tab-farm-btn').style.display = '';
        spawnFloat(W / 2, GROUND * 0.15, '✦ FARM UNLOCKED ✦', '#e8a040');
    }

    for (let i = 0; i < UPGRADES.length; i++) buildCard(i);
    syncPanel();
    saveGame();
}

// ═══════════════════════════════════════════════════════════════
//  FARM TAB
// ═══════════════════════════════════════════════════════════════
let activeTab = 'wood';

function switchTab(tab) {
    activeTab = tab;
    floats.length = 0; // clear any pending floats from the other tab
    document.getElementById('tab-wood').classList.toggle('hidden', tab !== 'wood');
    document.getElementById('tab-farm').classList.toggle('active', tab === 'farm');
    document.getElementById('tab-wood-btn').classList.toggle('active', tab === 'wood');
    document.getElementById('tab-farm-btn').classList.toggle('active', tab === 'farm');
}

// ═══════════════════════════════════════════════════════════════
//  FARM SCENE
// ═══════════════════════════════════════════════════════════════
const WHEAT_GROW_TIME = 10000; // 10 seconds

function harvestWheat(plotIdx) {
    const plot = game.farm.plots[plotIdx];
    if (!plot || !plot.grown) return;
    const gained = 10;
    game.food += gained;
    spawnFloat(W / 2, Math.round(H * 0.35), `+${gained} FOOD`, '#E8B020');
    plot.growth   = 0;
    plot.grown    = false;
    plot.readyPing = false;
    document.getElementById('food-hud').classList.remove('hidden');
    document.getElementById('foodCount').textContent = formatNum(game.food);
    saveGame();
}

function drawFarmScene(ts) {
    const plot = game.farm.plots[0];

    // ── Sky ──
    const skyH = Math.round(H * 0.38);
    const skyGrad = ctx.createLinearGradient(0, 0, 0, skyH);
    skyGrad.addColorStop(0, '#3870b8');
    skyGrad.addColorStop(1, '#68a8e0');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, skyH);

    // Clouds
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#e8f4ff';
    ctx.beginPath();
    ctx.ellipse(Math.round(W * 0.22), Math.round(skyH * 0.35), 38, 14, 0, 0, Math.PI * 2);
    ctx.ellipse(Math.round(W * 0.24), Math.round(skyH * 0.28), 26, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(Math.round(W * 0.68), Math.round(skyH * 0.45), 44, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(Math.round(W * 0.70), Math.round(skyH * 0.36), 28, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Hedgerow horizon ──
    ctx.fillStyle = '#2a5c18';
    ctx.fillRect(0, skyH - 10, W, 18);
    ctx.fillStyle = '#1e4810';
    ctx.fillRect(0, skyH + 4, W, 8);

    // ── Ground / soil ──
    const groundY = skyH + 12;
    const soilGrad = ctx.createLinearGradient(0, groundY, 0, H);
    soilGrad.addColorStop(0, '#5a3018');
    soilGrad.addColorStop(1, '#2a1508');
    ctx.fillStyle = soilGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    // Soil furrow rows
    const furrowH = Math.round(H * 0.055);
    for (let r = 0; r * furrowH + groundY < H; r++) {
        ctx.fillStyle = r % 2 === 0 ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.03)';
        ctx.fillRect(0, groundY + r * furrowH, W, furrowH);
    }

    // ── Wheat plot frame ──
    const plotX  = Math.round(W * 0.08);
    const plotW  = Math.round(W * 0.84);
    const plotTop = groundY + Math.round(H * 0.02);
    const maxStalkH = Math.round(H * 0.36);

    // Frame
    ctx.fillStyle = '#2a1808';
    ctx.fillRect(plotX - 4, plotTop - 4, plotW + 8, maxStalkH + 8);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(plotX, plotTop, plotW, maxStalkH);

    // ── Wheat stalks ──
    const numStalks = Math.round(plotW / (P * 2));
    const stalkSpacing = plotW / numStalks;
    const stalkH = Math.round(plot.growth * maxStalkH);

    if (stalkH > 2) {
        for (let i = 0; i < numStalks; i++) {
            const sx = Math.round(plotX + stalkSpacing * (i + 0.5));
            const sy = plotTop + maxStalkH; // base of stalk
            const sway = Math.round(Math.sin(ts / 1400 + i * 0.9) * 1.5);

            // Stem
            ctx.fillStyle = '#5a9020';
            ctx.fillRect(sx - 1 + sway, sy - stalkH, 2, stalkH);
            // Stem highlight
            ctx.fillStyle = '#70b030';
            ctx.fillRect(sx + sway, sy - stalkH, 1, stalkH);

            // Grain head fades in above 80% growth
            if (plot.growth > 0.80) {
                const headAlpha = Math.min(1, (plot.growth - 0.80) / 0.20);
                const headH = Math.round(P * 2.5);
                ctx.globalAlpha = headAlpha;
                // Head body
                ctx.fillStyle = '#C89020';
                ctx.fillRect(sx - 3 + sway, sy - stalkH - headH, 6, headH);
                // Bright tip
                ctx.fillStyle = '#E8C040';
                ctx.fillRect(sx - 2 + sway, sy - stalkH - headH - P/2, 4, Math.round(P/2));
                // Seeds along head
                ctx.fillStyle = '#A07010';
                for (let s = 0; s < 3; s++) {
                    ctx.fillRect(sx - 3 + sway + (s % 2 === 0 ? -1 : 3), sy - stalkH - Math.round(headH * (s + 1) / 4), 2, 2);
                }
                ctx.globalAlpha = 1;
            }
        }
    }

    // Glow overlay when ready to harvest
    if (plot.grown) {
        const pulse = 0.12 + 0.08 * Math.sin(ts / 350);
        ctx.fillStyle = `rgba(232,176,32,${pulse})`;
        ctx.fillRect(plotX, plotTop, plotW, maxStalkH);
    }

    // ── Progress / harvest bar ──
    const barY = plotTop + maxStalkH + Math.round(H * 0.04);
    const barH2 = Math.round(Math.max(10, Math.min(16, H * 0.025)));
    const fSize = Math.round(Math.max(11, Math.min(16, W * 0.032)));

    ctx.fillStyle = '#1a0d05';
    ctx.fillRect(plotX - 2, barY - 2, plotW + 4, barH2 + 4);
    ctx.fillStyle = '#2a1508';
    ctx.fillRect(plotX, barY, plotW, barH2);

    if (!plot.grown) {
        const fillW = Math.round(plot.growth * plotW);
        if (fillW > 0) {
            ctx.fillStyle = '#5a9020';
            ctx.fillRect(plotX, barY, fillW, barH2);
            if (fillW > 3) {
                ctx.fillStyle = '#70b030';
                ctx.fillRect(plotX, barY, fillW - 2, barH2 - 3);
            }
        }
        const secsLeft = ((1 - plot.growth) * WHEAT_GROW_TIME / 1000).toFixed(1);
        ctx.fillStyle = '#6a5030';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        ctx.fillText(`GROWING  ${secsLeft}s`, W / 2, barY + barH2 + fSize + 2);
    } else {
        // Full gold bar
        ctx.fillStyle = '#c89020';
        ctx.fillRect(plotX, barY, plotW, barH2);
        if (plotW > 3) {
            ctx.fillStyle = '#e8b030';
            ctx.fillRect(plotX, barY, plotW - 2, barH2 - 3);
        }
        const pulse = 0.7 + 0.3 * Math.sin(ts / 350);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#E8C040';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        ctx.fillText('\u2190 SWIPE TO HARVEST \u2192', W / 2, barY + barH2 + fSize + 2);
        ctx.globalAlpha = 1;
    }

    drawFloats();
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = 0;

function chopTree(tree, cx) {
    const gained = getWoodMultiplier();
    game.wood += gained;
    const wLabel = gained % 1 === 0 ? `+${gained} WOOD` : `+${gained.toFixed(2)} WOOD`;
    if (activeTab !== 'farm') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, wLabel, '#c8a450');

    if (tree.hasFruit) {
        const foodGained = getFoodMultiplier();
        game.food += foodGained;
        const fLabel = foodGained % 1 === 0 ? `+${foodGained} FOOD` : `+${foodGained.toFixed(2)} FOOD`;
        if (activeTab !== 'farm') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 36, fLabel, '#e07020');
    }

    game.firstChopDone = true;
    tree.clicks     = 0;
    tree.growth     = 0;
    tree.grown      = false;
    tree.readyPing  = false;
    tree.shakeTimer = 0;
    tree.hasFruit   = false;
}

function loop(ts) {
    const dt = lastTs ? ts - lastTs : 0;
    lastTs = ts;

    const growTime = getGrowTime();
    const centers  = treeCenters();

    // Grow trees & assign fruit when ready
    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];

        if (!tree.grown) {
            tree.growth = Math.min(1, tree.growth + dt / growTime);
            if (tree.growth >= 1 && !tree.readyPing) {
                tree.grown     = true;
                tree.readyPing = true;
                // Roll fruit chance
                const fc = getFruitChance();
                if (fc > 0 && Math.random() < fc) tree.hasFruit = true;
                if (activeTab !== 'farm') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, '✦ READY ✦', '#6DC040');
            }
        }

        if (tree.shakeTimer > 0) {
            tree.shakeTimer -= dt;
            tree.shakeX = Math.sin(tree.shakeTimer / 25) * 4;
        }
    }

    // Forester's Lodge auto-chop
    const lodgeCPS = getLodgeCPS();
    if (lodgeCPS > 0) {
        game.lodgeAccum += dt * lodgeCPS / 1000;
        while (game.lodgeAccum >= 1) {
            game.lodgeAccum -= 1;
            const ctrs = treeCenters();
            const candidates = game.trees.map((t, i) => ({ t, i })).filter(({ t }) => t.grown);
            if (candidates.length > 0) {
                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                const lt = pick.t;
                const lcx = ctrs[pick.i];
                lt.clicks++;
                lt.shakeTimer = 150;
                if (lt.clicks >= getClicksNeeded()) {
                    chopTree(lt, lcx);
                    saveGame();
                }
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.35;
        p.life -= dt / 550;
        if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i];
        f.y    -= dt * 0.035;
        f.life -= dt / 1600;
        if (f.life <= 0) floats.splice(i, 1);
    }

    // Grow wheat plots regardless of active tab
    for (const plot of game.farm.plots) {
        if (!plot.grown) {
            plot.growth = Math.min(1, plot.growth + dt / WHEAT_GROW_TIME);
            if (plot.growth >= 1 && !plot.readyPing) {
                plot.grown     = true;
                plot.readyPing = true;
            }
        }
    }

    ctx.clearRect(0, 0, W, H);
    if (activeTab === 'farm') {
        drawFarmScene(ts);
    } else {
        drawBackground(ts);
        drawCabin(ts);
        drawAllTrees(ts);
        drawParticles();
        drawFloats();
        drawUI(ts);
        syncPanel();
    }

    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
function handleTap(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mx   = (clientX - rect.left) * (W / rect.width);
    const my   = (clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = ctrs[i];
        if (!tree.grown || !hitTest(mx, my, cx, tree)) continue;

        tree.clicks++;
        tree.shakeTimer = 280;
        spawnChips(mx, my);

        if (tree.clicks >= getClicksNeeded()) {
            chopTree(tree, cx);
            saveGame();
        }
        break;
    }
}

let swipeStartX = null;

canvas.addEventListener('click', (e) => {
    if (activeTab === 'wood') handleTap(e.clientX, e.clientY);
});

canvas.addEventListener('mousedown', (e) => {
    if (activeTab === 'farm') swipeStartX = e.clientX;
});
canvas.addEventListener('mouseup', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.clientX - swipeStartX) > W * 0.15) harvestWheat(0);
        swipeStartX = null;
    }
});

canvas.addEventListener('touchstart', (e) => {
    if (activeTab === 'farm') {
        swipeStartX = e.changedTouches[0].clientX;
    } else {
        e.preventDefault();
        handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.changedTouches[0].clientX - swipeStartX) > W * 0.15) harvestWheat(0);
        swipeStartX = null;
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (activeTab !== 'wood') { canvas.style.cursor = 'default'; return; }
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    const my   = (e.clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();
    const hover = game.trees.some((tree, i) => tree.grown && hitTest(mx, my, ctrs[i], tree));
    canvas.style.cursor = hover ? 'pointer' : 'default';
});

// ═══════════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════════
const SAVE_KEY = 'woodland_save_v2';
let saveIndicatorTimeout = null;

function saveGame() {
    try {
        const data = {
            wood: game.wood,
            food: game.food,
            firstChopDone: game.firstChopDone,
            upgrades: UPGRADES.map(u => u.level),
            trees: game.trees.map(t => ({
                growth: t.growth, grown: t.grown,
                clicks: t.clicks, hasFruit: t.hasFruit,
            })),
            farm: { plots: game.farm.plots.map(p => ({ growth: p.growth, grown: p.grown })) },
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));

        const el = document.getElementById('save-indicator');
        el.classList.add('show');
        clearTimeout(saveIndicatorTimeout);
        saveIndicatorTimeout = setTimeout(() => el.classList.remove('show'), 1200);
    } catch(e) {}
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);

        if (typeof data.wood === 'number' && isFinite(data.wood))
            game.wood = data.wood;
        if (typeof data.food === 'number' && isFinite(data.food))
            game.food = data.food;
        if (typeof data.firstChopDone === 'boolean')
            game.firstChopDone = data.firstChopDone;

        if (Array.isArray(data.upgrades)) {
            data.upgrades.forEach((lvl, i) => {
                if (UPGRADES[i] && typeof lvl === 'number' && lvl >= 0 && lvl <= UPGRADES[i].maxLevel)
                    UPGRADES[i].level = lvl;
            });
        }

        if (Array.isArray(data.trees) && data.trees.length > 0) {
            game.trees = data.trees.map(t => ({
                growth:    (typeof t.growth === 'number' && isFinite(t.growth)) ? Math.max(0, Math.min(1, t.growth)) : 0,
                grown:     t.grown    === true,
                clicks:    (typeof t.clicks === 'number') ? t.clicks : 0,
                hasFruit:  t.hasFruit === true,
                shakeTimer: 0, shakeX: 0, readyPing: t.grown === true,
            }));
        }

        // Restore farm state
        if (data.farm && Array.isArray(data.farm.plots) && data.farm.plots.length > 0) {
            game.farm.plots = data.farm.plots.map(p => ({
                growth:    (typeof p.growth === 'number' && isFinite(p.growth)) ? Math.max(0, Math.min(1, p.growth)) : 0,
                grown:     p.grown === true,
                readyPing: p.grown === true,
            }));
        }

        // Restore UI state
        if (UPGRADES[7].level > 0) {
            document.getElementById('tab-farm-btn').style.display = '';
        }
        if (UPGRADES[4].level > 0 || game.food > 0) {
            document.getElementById('food-hud').classList.remove('hidden');
        }
    } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  TITLE SCREEN
// ═══════════════════════════════════════════════════════════════
function hasSave() {
    try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

function eraseSave() {
    try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function resetGameState() {
    game.wood          = 0;
    game.food          = 0;
    game.firstChopDone = false;
    game.lodgeAccum    = 0;
    game.trees         = [makeTree()];
    game.farm          = { plots: [makePlot()] };
    UPGRADES.forEach(u => u.level = 0);
    document.getElementById('tab-farm-btn').style.display = 'none';
    document.getElementById('food-hud').classList.add('hidden');
}

function startGame() {
    document.getElementById('title-screen').classList.add('hidden');
    buildPanel();
    const ro = new ResizeObserver(() => resizeCanvas());
    ro.observe(canvas);
    requestAnimationFrame(() => {
        resizeCanvas();
        initClouds();
        requestAnimationFrame(loop);
    });
}

function showTitleScreen() {
    const btnResume      = document.getElementById('btn-resume');
    const confirmOverlay = document.getElementById('confirm-overlay');

    if (hasSave()) {
        btnResume.classList.remove('hidden');
    } else {
        btnResume.classList.add('hidden');
    }

    btnResume.addEventListener('click', () => {
        loadGame();
        startGame();
    });

    document.getElementById('btn-new').addEventListener('click', () => {
        if (hasSave()) {
            confirmOverlay.classList.remove('hidden');
        } else {
            resetGameState();
            startGame();
        }
    });

    document.getElementById('confirm-yes').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
        eraseSave();
        resetGameState();
        startGame();
    });

    document.getElementById('confirm-no').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
    });
}

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
showTitleScreen();
</script>
