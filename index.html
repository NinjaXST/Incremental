<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Woodland</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0a07;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        h1 {
            color: #c8a450;
            font-size: 26px;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 14px;
            text-shadow: 0 0 24px #8B6320, 0 0 8px #5c3d1e;
        }
        #wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        #game-wrap {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #gameCanvas {
            display: block;
            border: 3px solid #4a2e10;
            box-shadow: 0 0 40px #2a1005;
            image-rendering: pixelated;
            cursor: default;
        }
        #hud {
            color: #c8a450;
            font-size: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #8B6320;
            text-align: center;
        }
        #hud span { color: #e8d090; }

        /* ── Upgrade panel ── */
        #upgrade-panel {
            width: 208px;
            height: 400px;
            background: #080604;
            border: 3px solid #4a2e10;
            box-shadow: 0 0 40px #2a1005;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            color: #c8a450;
            font-size: 11px;
            letter-spacing: 5px;
            text-align: center;
            padding: 9px 0 8px;
            border-bottom: 2px solid #3a1e08;
            background: #100a04;
            text-shadow: 0 0 8px #8B6320;
            flex-shrink: 0;
        }
        .upg-card {
            border-bottom: 1px solid #221408;
            padding: 10px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.1s;
        }
        .upg-card.affordable { cursor: pointer; }
        .upg-card.affordable:hover { background: #130d06; }
        .upg-card.broke { cursor: default; }
        .upg-card.maxed { cursor: default; opacity: 0.45; }
        .upg-name {
            color: #c8a450;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 1px;
        }
        .upg-effect {
            color: #7a9860;
            font-size: 9px;
            letter-spacing: 0.5px;
            line-height: 1.4;
            flex: 1;
        }
        .upg-lvl-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .upg-lvlbar-bg {
            flex: 1;
            height: 5px;
            background: #1e1108;
            border: 1px solid #3a1e08;
        }
        .upg-lvlbar-fill {
            height: 100%;
            background: #7a5018;
            transition: width 0.2s;
        }
        .upg-lvl-text {
            color: #6a5030;
            font-size: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .upg-cost-row {
            font-size: 10px;
            letter-spacing: 1px;
            margin-top: 2px;
            padding: 4px 6px;
            border: 1px solid #3a1e08;
            text-align: center;
        }
        .affordable .upg-cost-row {
            color: #6DC040;
            border-color: #3a6020;
            background: #0d1808;
        }
        .affordable:hover .upg-cost-row {
            background: #122010;
        }
        .broke .upg-cost-row {
            color: #4a3520;
            border-color: #2a1508;
        }
        .maxed .upg-cost-row {
            color: #3a2810;
            border-color: #221408;
        }
        .upg-next {
            color: #506840;
            font-size: 8px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <h1>Woodland</h1>
    <div id="wrapper">
        <div id="game-wrap">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div id="hud">Wood: <span id="woodCount">0</span></div>
        </div>
        <div id="upgrade-panel">
            <div class="panel-header">UPGRADES</div>
            <div id="upg-0" class="upg-card"></div>
            <div id="upg-1" class="upg-card"></div>
            <div id="upg-2" class="upg-card"></div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W      = canvas.width;
const H      = canvas.height;
const P      = 8;        // px per pixel-art cell
const GROUND = 272;      // y of ground surface

// ── Pixel art tree stages ──────────────────────────────────────
// ' '=air  T=trunk  M=leaf-mid  L=leaf-light  H=leaf-highlight
const TREE_ART = [
    // 0 – Sapling (0–20%)
    [' L ',
     ' T ',
     ' T '],
    // 1 – Sprout (20–50%)
    [' L ',
     'LML',
     ' T ',
     ' T ',
     ' T '],
    // 2 – Young tree (50–85%)
    ['  M  ',
     ' LML ',
     'LMMML',
     ' LML ',
     '  T  ',
     '  T  ',
     '  T  ',
     '  T  ',
     '  T  '],
    // 3 – Full tree (85–100%)
    ['   H   ',
     '  HMH  ',
     ' MMMMM ',
     'LMMMMML',
     'MMMMMMM',
     'LMMMMML',
     ' MMMMM ',
     '  LML  ',
     '   T   ',
     '   T   ',
     '   T   ',
     '   T   ',
     '   T   ',
     '   T   '],
];

const PALETTE = { ' ':null, T:'#7B4A1E', M:'#3D7228', L:'#52922E', H:'#6DC040' };

// ── Decorative stars (fixed random) ───────────────────────────
const STARS = Array.from({ length: 40 }, () => ({
    x: Math.random() * W,
    y: Math.random() * (GROUND - 60),
    s: Math.random() < 0.25 ? 2 : 1,
    tw: Math.random() * Math.PI * 2,
}));

// ── Background silhouette trees ────────────────────────────────
const BG_TREES = [
    { x: 45, h: 48 }, { x: 110, h: 36 }, { x: 168, h: 55 },
    { x: 432, h: 50 }, { x: 492, h: 38 }, { x: 558, h: 44 },
];

// ═══════════════════════════════════════════════════════════════
//  UPGRADES
// ═══════════════════════════════════════════════════════════════
const UPGRADES = [
    {
        id: 'growSpeed',
        name: 'SWIFT ROOTS',
        maxLevel: 20,
        level: 0,
        costBase: 2,
        costMult: 2.2,
        cost() {
            return Math.ceil(this.costBase * Math.pow(this.costMult, this.level));
        },
        // Total grow time (ms) at a given level. Each additional level gives
        // diminishing benefit: reduction_per_level = 1s * 0.75^(level-1)
        // Sum of geometric series → total reduction = 4s * (1 - 0.75^level)
        growTimeAt(lvl) {
            if (lvl === 0) return 10000;
            return Math.max(2000, 10000 - 4000 * (1 - Math.pow(0.75, lvl)));
        },
        effectText() {
            const cur = (this.growTimeAt(this.level) / 1000).toFixed(1);
            if (this.level >= this.maxLevel) return `Grow time: ${cur}s`;
            const nxt  = (this.growTimeAt(this.level + 1) / 1000).toFixed(1);
            const diff = ((this.growTimeAt(this.level) - this.growTimeAt(this.level + 1)) / 1000).toFixed(2);
            return `Grow time: ${cur}s\n▸ ${nxt}s  (−${diff}s)`;
        },
    },
    {
        id: 'chops',
        name: 'KEEN BLADE',
        maxLevel: 5,
        level: 0,
        costBase: 3,
        costMult: 3.2,
        cost() {
            return Math.ceil(this.costBase * Math.pow(this.costMult, this.level));
        },
        effectText() {
            const cur = 10 - this.level;
            if (this.level >= this.maxLevel) return `Chops needed: ${cur}`;
            return `Chops needed: ${cur}\n▸ ${cur - 1}  (−1 chop)`;
        },
    },
    {
        id: 'trees',
        name: 'PLANT A TREE',
        maxLevel: 4,
        level: 0,
        costBase: 10,
        costMult: 5.0,
        cost() {
            return Math.ceil(this.costBase * Math.pow(this.costMult, this.level));
        },
        effectText() {
            const cur = 1 + this.level;
            if (this.level >= this.maxLevel) return `Trees: ${cur} (max)`;
            return `Trees: ${cur}\n▸ ${cur + 1}  (doubles yield)`;
        },
    },
];

function getGrowTime()     { return UPGRADES[0].growTimeAt(UPGRADES[0].level); }
function getClicksNeeded() { return 10 - UPGRADES[1].level; }

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
function makeTree() {
    return { growth: 0, grown: false, clicks: 0,
             shakeTimer: 0, shakeX: 0, readyPing: false };
}

const game = {
    wood: 0,
    trees: [makeTree()],
};

// ═══════════════════════════════════════════════════════════════
//  PARTICLES & FLOATS
// ═══════════════════════════════════════════════════════════════
const particles = [];
function spawnChips(x, y) {
    for (let i = 0; i < 7; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 5,
            vy: -Math.random() * 6 - 1,
            life: 1,
            color: ['#7B4A1E','#A0602A','#C87A38'][Math.floor(Math.random() * 3)],
            size: (Math.floor(Math.random() * 3) + 1) * 2,
        });
    }
}

const floats = [];
function spawnFloat(x, y, text, color) {
    floats.push({ x, y, text, color, life: 1 });
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function getStage(growth) {
    if (growth < 0.20) return 0;
    if (growth < 0.50) return 1;
    if (growth < 0.85) return 2;
    return 3;
}

// Evenly distribute tree centers across canvas width
function treeCenters() {
    const n = game.trees.length;
    return Array.from({ length: n }, (_, i) => Math.round(W * (i + 1) / (n + 1)));
}

function treeRect(cx, tree) {
    const art  = TREE_ART[getStage(tree.growth)];
    const cols = art[0].length;
    const rows = art.length;
    const ox   = Math.round(cx - (cols / 2) * P) + (tree.shakeTimer > 0 ? Math.round(tree.shakeX) : 0);
    return { ox, oy: GROUND - rows * P, cols, rows };
}

function hitTest(mx, my, cx, tree) {
    const { ox, oy, cols, rows } = treeRect(cx, tree);
    return mx >= ox && mx <= ox + cols * P && my >= oy && my <= oy + rows * P;
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════
function drawBackground(ts) {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
    sky.addColorStop(0, '#141e2d');
    sky.addColorStop(1, '#1e3328');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND);

    // Stars
    for (const s of STARS) {
        ctx.globalAlpha = 0.5 + 0.5 * Math.sin(ts / 1800 + s.tw);
        ctx.fillStyle = '#e8dfc0';
        ctx.fillRect(Math.round(s.x), Math.round(s.y), s.s, s.s);
    }
    ctx.globalAlpha = 1;

    // Crescent moon
    ctx.fillStyle = '#e8dfc0';
    ctx.beginPath(); ctx.arc(520, 44, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#141e2d';
    ctx.beginPath(); ctx.arc(512, 39, 15, 0, Math.PI * 2); ctx.fill();

    // Silhouette BG trees
    ctx.fillStyle = '#182818';
    for (const bt of BG_TREES) {
        ctx.fillRect(bt.x - 13, GROUND - bt.h, 26, bt.h - 10);
        ctx.fillRect(bt.x - 3,  GROUND - 11,   6,  11);
    }

    // Ground
    const gnd = ctx.createLinearGradient(0, GROUND, 0, H);
    gnd.addColorStop(0, '#2a1a0a'); gnd.addColorStop(1, '#1a0d05');
    ctx.fillStyle = gnd;
    ctx.fillRect(0, GROUND, W, H - GROUND);

    // Grass rows
    ctx.fillStyle = '#2d6b20'; ctx.fillRect(0, GROUND,     W, P);
    ctx.fillStyle = '#245c18'; ctx.fillRect(0, GROUND + P, W, P);

    // Grass tufts
    ctx.fillStyle = '#3a8828';
    for (let gx = 16; gx < W; gx += 48) {
        ctx.fillRect(gx,      GROUND - P,     P,   P);
        ctx.fillRect(gx + 18, GROUND - P + 2, P-1, P-1);
        ctx.fillRect(gx + 34, GROUND - P,     P-1, P);
    }
}

function drawOneTree(ts, cx, tree) {
    const { ox, oy, cols, rows } = treeRect(cx, tree);
    const art = TREE_ART[getStage(tree.growth)];

    if (tree.grown) {
        ctx.shadowColor = '#6DC040';
        ctx.shadowBlur  = (0.4 + 0.2 * Math.sin(ts / 350)) * 18;
    }
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < art[r].length; c++) {
            const col = PALETTE[art[r][c]];
            if (!col) continue;
            ctx.fillStyle = col;
            ctx.fillRect(ox + c * P, oy + r * P, P, P);
        }
    }
    ctx.shadowBlur = 0;
}

function drawAllTrees(ts) {
    const centers = treeCenters();
    for (let i = 0; i < game.trees.length; i++) {
        drawOneTree(ts, centers[i], game.trees[i]);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawFloats() {
    ctx.textAlign = 'center';
    for (const f of floats) {
        ctx.globalAlpha = f.life;
        ctx.fillStyle   = f.color;
        ctx.font        = 'bold 13px "Courier New"';
        ctx.fillText(f.text, f.x, Math.round(f.y));
    }
    ctx.globalAlpha = 1;
}

function drawUI(ts) {
    const centers      = treeCenters();
    const clicksNeeded = getClicksNeeded();
    // Bar width scales down a little with more trees
    const barW = Math.max(60, Math.min(110, Math.floor(W / game.trees.length) - 24));
    const barH = 8;
    const by   = GROUND + 18;

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];
        const bx   = Math.round(cx - barW / 2);

        // Outline + background
        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
        ctx.fillStyle = '#2a1508';
        ctx.fillRect(bx, by, barW, barH);

        ctx.font      = '9px "Courier New"';
        ctx.textAlign = 'center';

        if (!tree.grown) {
            // Growth bar
            const fill = tree.growth * barW;
            if (fill > 0) {
                ctx.fillStyle = '#2d6b20';
                ctx.fillRect(bx, by, fill, barH);
                if (fill > 3) { ctx.fillStyle = '#3a8828'; ctx.fillRect(bx, by, fill - 2, barH - 3); }
            }
            ctx.fillStyle = '#6a5030';
            ctx.fillText('GROWING', cx, by + barH + 13);
        } else {
            // Chop bar
            const fill = (tree.clicks / clicksNeeded) * barW;
            if (fill > 0) {
                ctx.fillStyle = '#7B4A1E';
                ctx.fillRect(bx, by, fill, barH);
                if (fill > 3) { ctx.fillStyle = '#A0602A'; ctx.fillRect(bx, by, fill - 2, barH - 3); }
            }
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${tree.clicks}/${clicksNeeded}`, cx, by + barH + 13);

            // Pulse indicator above tree
            const art  = TREE_ART[getStage(tree.growth)];
            const topY = GROUND - art.length * P - 6;
            ctx.globalAlpha = 0.6 + 0.4 * Math.sin(ts / 350);
            ctx.fillStyle   = '#6DC040';
            ctx.font        = 'bold 10px "Courier New"';
            ctx.fillText('▼', cx, topY);
            ctx.globalAlpha = 1;
        }
    }

    document.getElementById('woodCount').textContent = game.wood;
}

// ═══════════════════════════════════════════════════════════════
//  UPGRADE PANEL (DOM)
// ═══════════════════════════════════════════════════════════════

// buildCard: rebuild one card's full HTML (only on init / after purchase).
// Event listeners live on the card element itself so they survive innerHTML swaps.
function buildCard(i) {
    const u     = UPGRADES[i];
    const atMax = u.level >= u.maxLevel;
    const cost  = atMax ? 0 : u.cost();
    const pct   = (u.level / u.maxLevel * 100).toFixed(1);
    const lines = u.effectText().split('\n');
    const el    = document.getElementById(`upg-${i}`);

    el.innerHTML = `
        <div class="upg-name">${u.name}</div>
        <div class="upg-effect">${lines[0]}${lines[1] ? `<br><span class="upg-next">${lines[1]}</span>` : ''}</div>
        <div class="upg-lvl-row">
            <div class="upg-lvlbar-bg">
                <div class="upg-lvlbar-fill" style="width:${pct}%"></div>
            </div>
            <div class="upg-lvl-text">${atMax ? 'MAX' : `${u.level}/${u.maxLevel}`}</div>
        </div>
        <div class="upg-cost-row" id="upg-cost-${i}">
            ${atMax ? '— MAXED —' : `▶ ${cost} WOOD`}
        </div>`;
}

// buildPanel: called once on startup. Wires click listeners and builds all cards.
function buildPanel() {
    for (let i = 0; i < UPGRADES.length; i++) {
        const el = document.getElementById(`upg-${i}`);
        el.addEventListener('click', () => buyUpgrade(i));
        buildCard(i);
    }
    syncPanel();
}

// syncPanel: cheap per-frame update — only touches className and cost text.
// Never rebuilds innerHTML, so click listeners always stay alive.
function syncPanel() {
    for (let i = 0; i < UPGRADES.length; i++) {
        const u      = UPGRADES[i];
        const atMax  = u.level >= u.maxLevel;
        const cost   = atMax ? 0 : u.cost();
        const afford = !atMax && game.wood >= cost;
        const el     = document.getElementById(`upg-${i}`);

        el.className = 'upg-card ' + (atMax ? 'maxed' : afford ? 'affordable' : 'broke');

        const costEl = document.getElementById(`upg-cost-${i}`);
        if (costEl && !atMax) costEl.textContent = `▶ ${cost} WOOD`;
    }
}

function buyUpgrade(idx) {
    const u = UPGRADES[idx];
    if (u.level >= u.maxLevel) return;
    const cost = u.cost();
    if (game.wood < cost) return;

    game.wood -= cost;
    u.level++;

    if (u.id === 'trees') {
        game.trees.push(makeTree());
        spawnFloat(W / 2, 60, '✦ NEW TREE PLANTED ✦', '#6DC040');
    }

    // Rebuild all cards (level text, bar, effect text all changed)
    for (let i = 0; i < UPGRADES.length; i++) buildCard(i);
    syncPanel();
    document.getElementById('woodCount').textContent = game.wood;
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = 0;

function loop(ts) {
    const dt = lastTs ? ts - lastTs : 0;
    lastTs = ts;

    // — Update trees —
    const growTime     = getGrowTime();
    const clicksNeeded = getClicksNeeded();
    const centers      = treeCenters();

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];

        if (!tree.grown) {
            tree.growth = Math.min(1, tree.growth + dt / growTime);
            if (tree.growth >= 1 && !tree.readyPing) {
                tree.grown     = true;
                tree.readyPing = true;
                spawnFloat(cx, GROUND - TREE_ART[3].length * P - 18, '✦ READY ✦', '#6DC040');
            }
        }

        if (tree.shakeTimer > 0) {
            tree.shakeTimer -= dt;
            tree.shakeX = Math.sin(tree.shakeTimer / 25) * 4;
        }
    }

    // — Update particles —
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.35;
        p.life -= dt / 550;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // — Update floats —
    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i];
        f.y    -= dt * 0.035;
        f.life -= dt / 1600;
        if (f.life <= 0) floats.splice(i, 1);
    }

    // — Draw —
    ctx.clearRect(0, 0, W, H);
    drawBackground(ts);
    drawAllTrees(ts);
    drawParticles();
    drawFloats();
    drawUI(ts);

    syncPanel();     // keeps cost colors synced with wood count
    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    const my   = (e.clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = ctrs[i];
        if (!tree.grown || !hitTest(mx, my, cx, tree)) continue;

        tree.clicks++;
        tree.shakeTimer = 280;
        spawnChips(mx, my);

        if (tree.clicks >= getClicksNeeded()) {
            game.wood++;
            spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, '+1 WOOD', '#c8a450');
            tree.clicks     = 0;
            tree.growth     = 0;
            tree.grown      = false;
            tree.readyPing  = false;
            tree.shakeTimer = 0;
        }
        break;
    }
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    const my   = (e.clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();
    const hover = game.trees.some((tree, i) => tree.grown && hitTest(mx, my, ctrs[i], tree));
    canvas.style.cursor = hover ? 'pointer' : 'default';
});
