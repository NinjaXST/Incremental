let activeTab = 'wood';

function switchTab(tab) {
    activeTab = tab;
    floats.length = 0;
    document.getElementById('tab-wood').classList.toggle('hidden', tab !== 'wood');
    document.getElementById('tab-farm').classList.toggle('active', tab === 'farm');
    document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
    document.getElementById('tab-wood-btn').classList.toggle('active', tab === 'wood');
    const farmBtn = document.getElementById('tab-farm-btn');
    farmBtn.classList.toggle('active', tab === 'farm');
    if (tab === 'farm') farmBtn.classList.remove('new');
    const mineBtn = document.getElementById('tab-mine-btn');
    mineBtn.classList.toggle('active', tab === 'mine');
    if (tab === 'mine') mineBtn.classList.remove('new');
}

// ═══════════════════════════════════════════════════════════════
//  FARM SCENE
// ═══════════════════════════════════════════════════════════════
const WHEAT_GROW_TIME = 10000; // 10 seconds

const WHEAT_SWIPES_NEEDED = 8;
const WHEAT_FOOD_YIELD    = 100;

function getPlotLayout() {
    const nPlots = game.farm.plots.length;
    const margin = Math.round(W * 0.08);
    const gap    = Math.round(W * 0.02);
    const plotW  = Math.round((W - margin * 2 - gap * (nPlots - 1)) / nPlots);
    return game.farm.plots.map((_, i) => ({
        x: margin + i * (plotW + gap),
        w: plotW,
        cx: margin + i * (plotW + gap) + Math.round(plotW / 2),
    }));
}

function getPlotIdxFromClientX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (W / rect.width);
    const layout = getPlotLayout();
    for (let i = 0; i < layout.length; i++) {
        if (x >= layout[i].x && x <= layout[i].x + layout[i].w) return i;
    }
    // fallback: find nearest
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < layout.length; i++) {
        const dist = Math.abs(x - layout[i].cx);
        if (dist < bestDist) { bestDist = dist; best = i; }
    }
    return best;
}

function harvestWheat(plotIdx) {
    const plot = game.farm.plots[plotIdx];
    if (!plot || !plot.grown) return;
    plot.swipeCount = (plot.swipeCount || 0) + 1;
    if (plot.swipeCount < getSwipesNeeded()) return;
    game.food += WHEAT_FOOD_YIELD * getPureLineMult();
    const cx = getPlotLayout()[plotIdx]?.cx ?? W / 2;
    const floatSize = Math.max(14, Math.round(52 / game.farm.plots.length));
    const wheatYield = WHEAT_FOOD_YIELD * getPureLineMult();
    const wheatLabel = Number.isInteger(wheatYield) ? `+${wheatYield} FOOD` : `+${wheatYield.toFixed(1)} FOOD`;
    spawnFloat(cx, Math.round(H * 0.35), wheatLabel, '#E8B020', floatSize);
    plot.growth    = 0;
    plot.grown     = false;
    plot.readyPing = false;
    plot.swipeCount = 0;
    document.getElementById('food-hud').classList.remove('hidden');
    document.getElementById('foodCount').textContent = formatNum(game.food);
    saveGame();
}

function drawPlot(plot, plotX, plotW, plotTop, maxStalkH, ts) {
    // Frame
    ctx.fillStyle = '#2a1808';
    ctx.fillRect(plotX - 4, plotTop - 4, plotW + 8, maxStalkH + 8);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(plotX, plotTop, plotW, maxStalkH);

    // ── Wheat stalks ──
    const numStalks = Math.max(1, Math.round(plotW / (P * 2)));
    const stalkSpacing = plotW / numStalks;
    const stalkH = Math.round(plot.growth * maxStalkH);

    if (stalkH > 2) {
        for (let i = 0; i < numStalks; i++) {
            const sx = Math.round(plotX + stalkSpacing * (i + 0.5));
            const sy = plotTop + maxStalkH;
            const sway = Math.round(Math.sin(ts / 1400 + i * 0.9) * 1.5);

            ctx.fillStyle = '#5a9020';
            ctx.fillRect(sx - 1 + sway, sy - stalkH, 2, stalkH);
            ctx.fillStyle = '#70b030';
            ctx.fillRect(sx + sway, sy - stalkH, 1, stalkH);

            if (plot.growth > 0.80) {
                const headAlpha = Math.min(1, (plot.growth - 0.80) / 0.20);
                const headH = Math.round(P * 2.5);
                ctx.globalAlpha = headAlpha;
                ctx.fillStyle = '#C89020';
                ctx.fillRect(sx - 3 + sway, sy - stalkH - headH, 6, headH);
                ctx.fillStyle = '#E8C040';
                ctx.fillRect(sx - 2 + sway, sy - stalkH - headH - P/2, 4, Math.round(P/2));
                ctx.fillStyle = '#A07010';
                for (let s = 0; s < 3; s++) {
                    ctx.fillRect(sx - 3 + sway + (s % 2 === 0 ? -1 : 3), sy - stalkH - Math.round(headH * (s + 1) / 4), 2, 2);
                }
                ctx.globalAlpha = 1;
            }
        }
    }

    // Glow overlay when ready
    if (plot.grown) {
        const pulse = 0.12 + 0.08 * Math.sin(ts / 350);
        ctx.fillStyle = `rgba(232,176,32,${pulse})`;
        ctx.fillRect(plotX, plotTop, plotW, maxStalkH);
    }

    // ── Progress / harvest bar ──
    const cx    = plotX + Math.round(plotW / 2);
    const barY  = plotTop + maxStalkH + Math.round(H * 0.04);
    const barH2 = Math.round(Math.max(10, Math.min(16, H * 0.025)));
    const fSize = Math.round(Math.max(9, Math.min(16, plotW * 0.12)));

    ctx.fillStyle = '#1a0d05';
    ctx.fillRect(plotX - 2, barY - 2, plotW + 4, barH2 + 4);
    ctx.fillStyle = '#2a1508';
    ctx.fillRect(plotX, barY, plotW, barH2);

    if (!plot.grown) {
        const fillW = Math.round(plot.growth * plotW);
        if (fillW > 0) {
            ctx.fillStyle = '#5a9020';
            ctx.fillRect(plotX, barY, fillW, barH2);
            if (fillW > 3) {
                ctx.fillStyle = '#70b030';
                ctx.fillRect(plotX, barY, fillW - 2, barH2 - 3);
            }
        }
        const secsLeft = ((1 - plot.growth) * getWheatGrowTime() / 1000).toFixed(1);
        ctx.fillStyle = '#6a5030';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        ctx.fillText(`${secsLeft}s`, cx, barY + barH2 + fSize + 2);
    } else {
        ctx.fillStyle = '#c89020';
        ctx.fillRect(plotX, barY, plotW, barH2);
        if (plotW > 3) {
            ctx.fillStyle = '#e8b030';
            ctx.fillRect(plotX, barY, plotW - 2, barH2 - 3);
        }
        const pulse = 0.7 + 0.3 * Math.sin(ts / 350);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#E8C040';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        const sc = plot.swipeCount || 0;
        const needed = getSwipesNeeded();
        const harvestLabel = sc > 0 ? `${sc}/${needed}` : '\u21d4 SWIPE';
        ctx.fillText(harvestLabel, cx, barY + barH2 + fSize + 2);
        ctx.globalAlpha = 1;
    }
}

function drawFarmScene(ts) {
    // ── Sky ──
    const skyH = Math.round(H * 0.38);
    const skyGrad = ctx.createLinearGradient(0, 0, 0, skyH);
    skyGrad.addColorStop(0, '#3870b8');
    skyGrad.addColorStop(1, '#68a8e0');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, skyH);

    // Clouds
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#e8f4ff';
    ctx.beginPath();
    ctx.ellipse(Math.round(W * 0.22), Math.round(skyH * 0.35), 38, 14, 0, 0, Math.PI * 2);
    ctx.ellipse(Math.round(W * 0.24), Math.round(skyH * 0.28), 26, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(Math.round(W * 0.68), Math.round(skyH * 0.45), 44, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(Math.round(W * 0.70), Math.round(skyH * 0.36), 28, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Hedgerow horizon ──
    ctx.fillStyle = '#2a5c18';
    ctx.fillRect(0, skyH - 10, W, 18);
    ctx.fillStyle = '#1e4810';
    ctx.fillRect(0, skyH + 4, W, 8);

    // ── Ground / soil ──
    const groundY = skyH + 12;
    const soilGrad = ctx.createLinearGradient(0, groundY, 0, H);
    soilGrad.addColorStop(0, '#5a3018');
    soilGrad.addColorStop(1, '#2a1508');
    ctx.fillStyle = soilGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    const furrowH = Math.round(H * 0.055);
    for (let r = 0; r * furrowH + groundY < H; r++) {
        ctx.fillStyle = r % 2 === 0 ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.03)';
        ctx.fillRect(0, groundY + r * furrowH, W, furrowH);
    }

    // ── Draw all plots ──
    const plotTop   = groundY + Math.round(H * 0.02);
    const maxStalkH = Math.round(H * 0.36);
    const layout    = getPlotLayout();

    for (let i = 0; i < game.farm.plots.length; i++) {
        drawPlot(game.farm.plots[i], layout[i].x, layout[i].w, plotTop, maxStalkH, ts);
    }

    drawFloats();
}

// ═══════════════════════════════════════════════════════════════
//  MINE MECHANICS
// ═══════════════════════════════════════════════════════════════
const MINE_ROCK_CLICKS = 20;
const MINE_CART_MAX    = 5;

function getMineRockBounds() {
    const rW = Math.round(W * 0.40);
    const rH = Math.round(H * 0.30);
    const rX = Math.round(W / 2 - rW / 2);
    const rY = H - rH - Math.round(H * 0.04);  // near bottom of canvas
    return { x: rX, y: rY, w: rW, h: rH, cx: Math.round(W / 2), cy: Math.round(rY + rH / 2) };
}

let mineSendCartBtn = null;

function sendCart() {
    const cart = game.mine.cart;
    if (cart.state !== 'idle' || cart.stones === 0) return;
    cart.state = 'leaving';
    cart.travelX = 0;
    cart.transportStones = cart.stones;
    cart.stones = 0;
    saveGame();
}

function mineRockTap(mx, my) {
    if (game.mine.cart.state !== 'idle') return;
    if (game.mine.rock.respawnTimer > 0) return;
    // Check SEND CART button first
    if (mineSendCartBtn) {
        const b2 = mineSendCartBtn;
        if (mx >= b2.x && mx <= b2.x + b2.w && my >= b2.y && my <= b2.y + b2.h) {
            sendCart(); return;
        }
    }
    const b = getMineRockBounds();
    // Ellipse hit test
    const dx = (mx - b.cx) / (b.w / 2);
    const dy = (my - b.cy) / (b.h / 2);
    if (dx * dx + dy * dy > 1) return;

    const rock = game.mine.rock;
    rock.clicks++;
    rock.shakeTimer = 120;

    spawnFloat(b.cx, b.y - 10, '⛏', '#c8a450', 22);

    if (rock.clicks >= MINE_ROCK_CLICKS) {
        rock.clicks = 0;
        rock.respawnTimer = 5000;
        if (game.mine.cart.stones < MINE_CART_MAX) {
            game.mine.cart.stones++;
            spawnFloat(b.cx, b.y - 28, '+1 STONE', '#a0b8c8', 18);
        } else {
            spawnFloat(b.cx, b.y - 28, 'CART FULL!', '#e05050', 18);
        }
    }
    saveGame();
}

// ═══════════════════════════════════════════════════════════════
//  MINE SCENE
// ═══════════════════════════════════════════════════════════════
function drawMineScene(ts) {
    // ── Cave background ──
    ctx.fillStyle = '#0d0b08';
    ctx.fillRect(0, 0, W, H);

    // Rocky ceiling
    const ceilH = Math.round(H * 0.12);
    ctx.fillStyle = '#2a2018';
    ctx.fillRect(0, 0, W, ceilH);
    // Ceiling jagged edge
    ctx.fillStyle = '#1a1410';
    for (let x = 0; x < W; x += Math.round(W / 18)) {
        const jH = Math.round(ceilH * (0.5 + 0.5 * Math.sin(x * 0.07 + 1.2)));
        ctx.fillRect(x, ceilH - jH, Math.round(W / 18) + 1, jH);
    }

    // Rocky floor
    const floorY = Math.round(H * 0.72);
    ctx.fillStyle = '#2a2018';
    ctx.fillRect(0, floorY, W, H - floorY);
    ctx.fillStyle = '#1a1410';
    for (let x = 0; x < W; x += Math.round(W / 14)) {
        const jH = Math.round(H * 0.04 * (0.5 + 0.5 * Math.sin(x * 0.11)));
        ctx.fillRect(x, floorY, Math.round(W / 14) + 1, jH);
    }

    // ── Stone wall texture (left & right) ──
    const wallW = Math.round(W * 0.08);
    ctx.fillStyle = '#221a10';
    ctx.fillRect(0, ceilH, wallW, floorY - ceilH);
    ctx.fillRect(W - wallW, ceilH, wallW, floorY - ceilH);
    // Stone blocks
    ctx.fillStyle = '#2e2416';
    for (let y = ceilH; y < floorY; y += Math.round(H * 0.1)) {
        ctx.fillRect(0, y, wallW, 2);
        ctx.fillRect(W - wallW, y, wallW, 2);
    }

    // ── Mine track ──
    const trackY = floorY - Math.round(H * 0.05);
    const tieW   = Math.round(W * 0.04);
    const tieH   = Math.round(H * 0.025);
    const tieGap = Math.round(W * 0.07);
    ctx.fillStyle = '#5a3a18';
    for (let x = wallW; x < W - wallW - tieW; x += tieGap) {
        ctx.fillRect(x, trackY, tieW, tieH);
    }
    // Rails
    ctx.fillStyle = '#707880';
    ctx.fillRect(wallW, trackY + 3, W - wallW * 2, 3);
    ctx.fillStyle = '#909aa0';
    ctx.fillRect(wallW, trackY + 3, W - wallW * 2, 1);
    ctx.fillStyle = '#707880';
    ctx.fillRect(wallW, trackY + tieH - 4, W - wallW * 2, 3);
    ctx.fillStyle = '#909aa0';
    ctx.fillRect(wallW, trackY + tieH - 4, W - wallW * 2, 1);

    // ── Torches ──
    const torchPositions = [Math.round(W * 0.2), Math.round(W * 0.5), Math.round(W * 0.8)];
    for (const tx of torchPositions) {
        const torchY = Math.round(ceilH + H * 0.08);
        // Glow
        const glow = 0.06 + 0.04 * Math.sin(ts / 300 + tx);
        const grad = ctx.createRadialGradient(tx, torchY, 0, tx, torchY, Math.round(W * 0.18));
        grad.addColorStop(0, `rgba(255,160,40,${glow + 0.08})`);
        grad.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(tx - Math.round(W * 0.18), torchY - Math.round(H * 0.1), Math.round(W * 0.36), Math.round(H * 0.4));
        // Torch stick
        ctx.fillStyle = '#5a3010';
        ctx.fillRect(tx - 2, torchY, 4, Math.round(H * 0.06));
        // Flame
        ctx.fillStyle = '#ff8020';
        ctx.fillRect(tx - 3, torchY - Math.round(H * 0.04), 6, Math.round(H * 0.04));
        ctx.fillStyle = '#ffcc40';
        ctx.fillRect(tx - 1, torchY - Math.round(H * 0.05), 2, Math.round(H * 0.03));
    }

    // ── Depth shaft (vanishing point) ──
    const vpX = Math.round(W / 2);
    const vpY = Math.round(H * 0.42);
    ctx.strokeStyle = '#3a2c18';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wallW, ceilH); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - wallW, ceilH); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wallW, floorY); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - wallW, floorY); ctx.lineTo(vpX, vpY); ctx.stroke();

    // ── Mine Cart ──
    {
        const wheelR   = Math.round(H * 0.034);
        const cartHW   = Math.round(W * 0.11);
        const cartBH   = Math.round(H * 0.10);
        const cartHome = wallW + Math.round(W * 0.14);  // home center x
        const cart     = game.mine.cart;
        const cartCX   = cartHome + Math.round(cart.travelX);
        const wheelCY  = trackY + tieH - 4 - wheelR;
        const bodyTop  = wheelCY - wheelR - cartBH;
        const bodyL    = cartCX - cartHW;
        const bodyR    = cartCX + cartHW;

        if (cart.state !== 'away') {
            // Wheels
            for (const wx of [cartCX - cartHW + wheelR + 2, cartCX + cartHW - wheelR - 2]) {
                ctx.fillStyle = '#1e1a10';
                ctx.beginPath(); ctx.arc(wx, wheelCY, wheelR, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#504838';
                ctx.beginPath(); ctx.arc(wx, wheelCY, wheelR - 2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#302820';
                ctx.beginPath(); ctx.arc(wx, wheelCY, Math.round(wheelR * 0.45), 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#686050';
                ctx.beginPath(); ctx.arc(wx, wheelCY, 1, 0, Math.PI * 2); ctx.fill();
            }

            // Cart body
            const slant = Math.round(cartBH * 0.12);
            ctx.fillStyle = '#302818';
            ctx.beginPath();
            ctx.moveTo(bodyL,         bodyTop);
            ctx.lineTo(bodyR,         bodyTop);
            ctx.lineTo(bodyR - slant, wheelCY - wheelR);
            ctx.lineTo(bodyL + slant, wheelCY - wheelR);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#1e1810';
            ctx.beginPath();
            ctx.moveTo(bodyL + 4,          bodyTop + 4);
            ctx.lineTo(bodyR - 4,          bodyTop + 4);
            ctx.lineTo(bodyR - slant - 2,  wheelCY - wheelR - 4);
            ctx.lineTo(bodyL + slant + 2,  wheelCY - wheelR - 4);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#706050';
            ctx.fillRect(bodyL, bodyTop,     cartHW * 2, 3);
            ctx.fillStyle = '#504030';
            ctx.fillRect(bodyL, bodyTop + 3, 3, cartBH - 6);
            ctx.fillRect(bodyR - 3, bodyTop + 3, 3, cartBH - 6);

            ctx.fillStyle = '#808878';
            for (let rv = 0; rv < 3; rv++) {
                const rvX = bodyL + Math.round(cartHW * 2 * (rv + 1) / 4);
                ctx.fillRect(rvX - 1, bodyTop + 6, 2, 2);
            }

            // Stone slots
            const stonesNow  = cart.stones;
            const slotW      = Math.round((cartHW * 2 - 10) / MINE_CART_MAX);
            const slotH      = Math.round(cartBH * 0.48);
            const slotStartY = bodyTop + Math.round(cartBH * 0.28);
            for (let s = 0; s < MINE_CART_MAX; s++) {
                const slotX = bodyL + 5 + s * slotW;
                if (s < stonesNow) {
                    ctx.fillStyle = '#686058';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, slotH);
                    ctx.fillStyle = '#888070';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, 2);
                    ctx.fillStyle = '#484038';
                    ctx.fillRect(slotX, slotStartY + slotH - 2, slotW - 2, 2);
                } else {
                    ctx.fillStyle = '#141008';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, slotH);
                }
            }

            // Stone count
            const lblSize = Math.max(9, Math.round(H * 0.028));
            ctx.font      = `bold ${lblSize}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = stonesNow >= MINE_CART_MAX ? '#e05050' : '#c8b880';
            ctx.fillText(`${stonesNow}/${MINE_CART_MAX}`, cartCX, bodyTop - 4);

            // SEND CART button (only when idle with at least 1 stone)
            if (cart.state === 'idle') {
                const btnW   = Math.round(cartHW * 2.2);
                const btnH   = Math.round(H * 0.055);
                const btnX   = cartHome - Math.round(btnW / 2);
                const btnY   = bodyTop - Math.round(H * 0.065) - btnH;
                const canSend = cart.stones > 0;
                // Store bounds for hit testing (use home position, not animated)
                mineSendCartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

                ctx.fillStyle = canSend ? '#4a3820' : '#1e1a12';
                ctx.fillRect(btnX, btnY, btnW, btnH);
                ctx.fillStyle = canSend ? '#7a6030' : '#302818';
                ctx.fillRect(btnX, btnY, btnW, 2);
                ctx.fillRect(btnX, btnY, 2, btnH);
                ctx.fillStyle = canSend ? '#2a1e0c' : '#141008';
                ctx.fillRect(btnX, btnY + btnH - 2, btnW, 2);
                ctx.fillRect(btnX + btnW - 2, btnY, 2, btnH);

                const btnFontSize = Math.max(9, Math.round(H * 0.026));
                ctx.font      = `bold ${btnFontSize}px 'Courier New'`;
                ctx.textAlign = 'center';
                ctx.fillStyle = canSend ? '#e8c060' : '#504030';
                ctx.fillText('SEND CART', cartHome, btnY + Math.round(btnH * 0.68));
            } else {
                mineSendCartBtn = null;
            }
        } else {
            // Cart is away — clear button and show countdown
            mineSendCartBtn = null;
            const secs    = Math.ceil(cart.timer / 1000);
            const countCX = cartHome;
            const countCY = wheelCY - Math.round(cartBH * 0.5);
            const fSz     = Math.max(10, Math.round(H * 0.030));
            ctx.font      = `bold ${fSz}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#7a6840';
            ctx.fillText('RETURNING IN', countCX, countCY - fSz);
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${secs}s`, countCX, countCY + Math.round(fSz * 0.4));
        }
    }

    // ── Large Rock ──
    {
        const b    = getMineRockBounds();
        const rock = game.mine.rock;

        if (rock.respawnTimer > 0) {
            // Rock is destroyed — show respawn countdown
            const secs  = Math.ceil(rock.respawnTimer / 1000);
            const fSz   = Math.max(12, Math.round(H * 0.032));
            ctx.font      = `bold ${fSz}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#5a4e30';
            ctx.fillText('NEW ROCK IN', b.cx, b.cy - Math.round(fSz * 0.5));
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${secs}s`, b.cx, b.cy + Math.round(fSz * 0.9));
        } else {

        const sx   = rock.shakeTimer > 0 ? rock.shakeX : 0;
        const prog = rock.clicks / MINE_ROCK_CLICKS;

        ctx.save();
        ctx.translate(sx, 0);

        // Base rock body
        ctx.beginPath();
        ctx.ellipse(b.cx, b.cy, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#4a4030';
        ctx.fill();

        // Mid tone texture blob
        ctx.beginPath();
        ctx.ellipse(b.cx - b.w * 0.08, b.cy - b.h * 0.1, b.w * 0.32, b.h * 0.28, -0.25, 0, Math.PI * 2);
        ctx.fillStyle = '#5c5040';
        ctx.fill();

        // Highlight (top-left)
        ctx.beginPath();
        ctx.ellipse(b.cx - b.w * 0.15, b.cy - b.h * 0.2, b.w * 0.2, b.h * 0.15, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = '#706050';
        ctx.fill();

        // Shadow (bottom-right)
        ctx.beginPath();
        ctx.ellipse(b.cx + b.w * 0.12, b.cy + b.h * 0.18, b.w * 0.22, b.h * 0.18, 0.35, 0, Math.PI * 2);
        ctx.fillStyle = '#302820';
        ctx.fill();

        // Pixel specular dots
        ctx.fillStyle = '#908060';
        ctx.fillRect(b.cx - Math.round(b.w * 0.18), b.cy - Math.round(b.h * 0.26), 4, 3);
        ctx.fillRect(b.cx - Math.round(b.w * 0.06), b.cy - Math.round(b.h * 0.30), 2, 2);
        ctx.fillStyle = '#a09070';
        ctx.fillRect(b.cx - Math.round(b.w * 0.20), b.cy - Math.round(b.h * 0.28), 2, 2);

        // Crack lines (revealed progressively)
        ctx.lineWidth = 2;
        if (prog >= 0.2) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx - 4, b.cy - Math.round(b.h * 0.08));
            ctx.lineTo(b.cx - Math.round(b.w * 0.18), b.cy + Math.round(b.h * 0.15));
            ctx.stroke();
        }
        if (prog >= 0.35) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx + 6, b.cy + Math.round(b.h * 0.02));
            ctx.lineTo(b.cx + Math.round(b.w * 0.20), b.cy - Math.round(b.h * 0.12));
            ctx.stroke();
        }
        if (prog >= 0.5) {
            ctx.strokeStyle = '#151008'; ctx.beginPath();
            ctx.moveTo(b.cx - 6, b.cy + Math.round(b.h * 0.06));
            ctx.lineTo(b.cx - Math.round(b.w * 0.10), b.cy + Math.round(b.h * 0.22));
            ctx.lineTo(b.cx - Math.round(b.w * 0.22), b.cy + Math.round(b.h * 0.14));
            ctx.stroke();
        }
        if (prog >= 0.65) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx + 4, b.cy - Math.round(b.h * 0.04));
            ctx.lineTo(b.cx + Math.round(b.w * 0.12), b.cy + Math.round(b.h * 0.18));
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.08), b.cy - Math.round(b.h * 0.18));
            ctx.lineTo(b.cx + Math.round(b.w * 0.02), b.cy + Math.round(b.h * 0.04));
            ctx.stroke();
        }
        if (prog >= 0.8) {
            ctx.strokeStyle = '#100d06'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.04), b.cy - Math.round(b.h * 0.32));
            ctx.lineTo(b.cx + Math.round(b.w * 0.06), b.cy + Math.round(b.h * 0.28));
            ctx.stroke();
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.14), b.cy - Math.round(b.h * 0.05));
            ctx.lineTo(b.cx + Math.round(b.w * 0.08), b.cy - Math.round(b.h * 0.20));
            ctx.stroke();
        }

        ctx.restore();

        // ── Progress pips below rock ──
        const pipSz  = 7;
        const pipGap = 5;
        const totalPW = MINE_ROCK_CLICKS * (pipSz + pipGap) - pipGap;
        const pipX0  = b.cx - Math.round(totalPW / 2);
        const pipY0  = b.y + b.h + Math.round(H * 0.012);
        for (let p = 0; p < MINE_ROCK_CLICKS; p++) {
            ctx.fillStyle = p < rock.clicks ? '#c8a450' : '#2e2618';
            ctx.fillRect(pipX0 + p * (pipSz + pipGap), pipY0, pipSz, pipSz);
        }
        // Pip border
        ctx.strokeStyle = '#1a1408';
        ctx.lineWidth = 1;
        for (let p = 0; p < MINE_ROCK_CLICKS; p++) {
            ctx.strokeRect(pipX0 + p * (pipSz + pipGap), pipY0, pipSz, pipSz);
        }

        } // end else (rock present)
    }

    drawFloats();
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = 0;
let lastHudSync = 0;

function chopTree(tree, cx) {
    const gained = getWoodMultiplier() * getLeafLitterMult();
    game.wood += gained;
    const wLabel = gained % 1 === 0 ? `+${gained} WOOD` : `+${gained.toFixed(2)} WOOD`;
    if (activeTab === 'wood') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, wLabel, '#c8a450');

    if (tree.hasFruit) {
        const foodGained = getFoodMultiplier() * getCropRotMult();
        game.food += foodGained;
        const fLabel = foodGained % 1 === 0 ? `+${foodGained} FOOD` : `+${foodGained.toFixed(2)} FOOD`;
        if (activeTab === 'wood') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 36, fLabel, '#e07020');
    }

    game.firstChopDone = true;
    tree.clicks     = 0;
    tree.growth     = 0;
    tree.grown      = false;
    tree.readyPing  = false;
    tree.shakeTimer = 0;
    tree.hasFruit   = false;
}

function loop(ts) {
    const dt = lastTs ? ts - lastTs : 0;
    lastTs = ts;

    const growTime = getGrowTime();
    const centers  = treeCenters();

    // Grow trees & assign fruit when ready
    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];

        if (!tree.grown) {
            tree.growth = Math.min(1, tree.growth + dt / growTime);
            if (tree.growth >= 1 && !tree.readyPing) {
                tree.grown     = true;
                tree.readyPing = true;
                // Roll fruit chance
                const fc = getFruitChance();
                if (fc > 0 && Math.random() < fc) tree.hasFruit = true;
                if (activeTab === 'wood') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, '✦ READY ✦', '#6DC040');
            }
        }

        if (tree.shakeTimer > 0) {
            tree.shakeTimer -= dt;
            tree.shakeX = Math.sin(tree.shakeTimer / 25) * 4;
        }
    }

    // Forester's Lodge auto-chop
    const lodgeCPS = getLodgeCPS();
    if (lodgeCPS > 0) {
        game.lodgeAccum += dt * lodgeCPS / 1000;
        while (game.lodgeAccum >= 1) {
            game.lodgeAccum -= 1;
            const ctrs = treeCenters();
            const candidates = game.trees.map((t, i) => ({ t, i })).filter(({ t }) => t.grown);
            if (candidates.length > 0) {
                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                const lt = pick.t;
                const lcx = ctrs[pick.i];
                lt.clicks++;
                lt.shakeTimer = 150;
                if (lt.clicks >= getClicksNeeded()) {
                    chopTree(lt, lcx);
                    saveGame();
                }
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.35;
        p.life -= dt / 550;
        if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i];
        f.y    -= dt * 0.035;
        f.life -= dt / 1600;
        if (f.life <= 0) floats.splice(i, 1);
    }

    // Mine rock shake / respawn
    if (game.mine.rock.shakeTimer > 0) {
        game.mine.rock.shakeTimer -= dt;
        game.mine.rock.shakeX = Math.sin(game.mine.rock.shakeTimer * 0.4) * 3;
    }
    if (game.mine.rock.respawnTimer > 0) {
        game.mine.rock.respawnTimer = Math.max(0, game.mine.rock.respawnTimer - dt);
    }

    // Mine cart travel / return timer
    {
        const cart = game.mine.cart;
        if (cart.state === 'leaving') {
            cart.travelX += dt * (W * 0.0014);   // crosses screen in ~0.7 s
            if (cart.travelX > W) {
                cart.state = 'away';
                cart.timer = 30000;
            }
        } else if (cart.state === 'away') {
            cart.timer = Math.max(0, cart.timer - dt);
            if (cart.timer <= 0) {
                game.stone += cart.transportStones;
                cart.transportStones = 0;
                cart.state = 'idle';
                cart.travelX = 0;
                updateHUD();
                saveGame();
            }
        }
    }

    // Grow wheat plots regardless of active tab
    for (const plot of game.farm.plots) {
        if (!plot.grown) {
            plot.growth = Math.min(1, plot.growth + dt / getWheatGrowTime());
            if (plot.growth >= 1 && !plot.readyPing) {
                plot.grown     = true;
                plot.readyPing = true;
            }
        }
    }

    ctx.clearRect(0, 0, W, H);
    if (activeTab === 'farm') {
        drawFarmScene(ts);
        if (ts - lastHudSync >= 200) { updateHUD(); syncPanel(); lastHudSync = ts; }
    } else if (activeTab === 'mine') {
        drawMineScene(ts);
        if (ts - lastHudSync >= 200) { updateHUD(); syncPanel(); lastHudSync = ts; }
    } else {
        drawBackground(ts);
        drawCabin(ts);
        drawAllTrees(ts);
        drawParticles();
        drawFloats();
        drawUI(ts);
        syncPanel();
    }

    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
function handleTap(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mx   = (clientX - rect.left) * (W / rect.width);
    const my   = (clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = ctrs[i];
        if (!tree.grown || !hitTest(mx, my, cx, tree)) continue;

        tree.clicks++;
        tree.shakeTimer = 280;
        spawnChips(mx, my);

        if (tree.clicks >= getClicksNeeded()) {
            chopTree(tree, cx);
            saveGame();
        }
        break;
    }
}

let swipeStartX = null;

canvas.addEventListener('click', (e) => {
    if (activeTab === 'wood') {
        handleTap(e.clientX, e.clientY);
    } else if (activeTab === 'mine') {
        const rect = canvas.getBoundingClientRect();
        mineRockTap((e.clientX - rect.left) * (W / rect.width), (e.clientY - rect.top) * (H / rect.height));
    }
});

canvas.addEventListener('mousedown', (e) => {
    if (activeTab === 'farm') swipeStartX = e.clientX;
});
canvas.addEventListener('mouseup', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.clientX - swipeStartX) > W * 0.15)
            harvestWheat(getPlotIdxFromClientX(swipeStartX));
        swipeStartX = null;
    }
});

canvas.addEventListener('touchstart', (e) => {
    if (activeTab === 'farm') {
        swipeStartX = e.changedTouches[0].clientX;
    } else if (activeTab === 'mine') {
        e.preventDefault();
        const t    = e.changedTouches[0];
        const rect = canvas.getBoundingClientRect();
        mineRockTap((t.clientX - rect.left) * (W / rect.width), (t.clientY - rect.top) * (H / rect.height));
    } else {
        e.preventDefault();
        handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.changedTouches[0].clientX - swipeStartX) > W * 0.15)
            harvestWheat(getPlotIdxFromClientX(swipeStartX));
        swipeStartX = null;
    }
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    const my   = (e.clientY - rect.top)  * (H / rect.height);
    if (activeTab === 'mine') {
        // Check SEND CART button
        if (mineSendCartBtn && game.mine.cart.stones > 0 &&
            mx >= mineSendCartBtn.x && mx <= mineSendCartBtn.x + mineSendCartBtn.w &&
            my >= mineSendCartBtn.y && my <= mineSendCartBtn.y + mineSendCartBtn.h) {
            canvas.style.cursor = 'pointer'; return;
        }
        const b  = getMineRockBounds();
        const dx = (mx - b.cx) / (b.w / 2);
        const dy = (my - b.cy) / (b.h / 2);
        canvas.style.cursor = (dx * dx + dy * dy <= 1 && game.mine.cart.state === 'idle') ? 'pointer' : 'default';
        return;
    }
    if (activeTab !== 'wood') { canvas.style.cursor = 'default'; return; }
    const ctrs  = treeCenters();
    const hover = game.trees.some((tree, i) => tree.grown && hitTest(mx, my, ctrs[i], tree));
    canvas.style.cursor = hover ? 'pointer' : 'default';
});

// ═══════════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════════
const SAVE_KEY = 'woodland_save_v2';
let saveIndicatorTimeout = null;

function saveGame() {
    try {
        const data = {
            wood: game.wood,
            food: game.food,
            firstChopDone: game.firstChopDone,
            upgrades: UPGRADES.map(u => u.level),
            trees: game.trees.map(t => ({
                growth: t.growth, grown: t.grown,
                clicks: t.clicks, hasFruit: t.hasFruit,
            })),
            farm: { plots: game.farm.plots.map(p => ({ growth: p.growth, grown: p.grown })) },
            mine: {
                rockClicks: game.mine.rock.clicks,
                rockRespawnTimer: game.mine.rock.respawnTimer,
                cartStones: game.mine.cart.stones,
                cartState: game.mine.cart.state,
                cartTimer: game.mine.cart.timer,
                cartTransportStones: game.mine.cart.transportStones,
            },
            stone: game.stone,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));

        const el = document.getElementById('save-indicator');
        el.classList.add('show');
        clearTimeout(saveIndicatorTimeout);
        saveIndicatorTimeout = setTimeout(() => el.classList.remove('show'), 1200);
    } catch(e) {}
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);

        if (typeof data.wood === 'number' && isFinite(data.wood))
            game.wood = data.wood;
        if (typeof data.food === 'number' && isFinite(data.food))
            game.food = data.food;
        if (typeof data.firstChopDone === 'boolean')
            game.firstChopDone = data.firstChopDone;

        if (Array.isArray(data.upgrades)) {
            data.upgrades.forEach((lvl, i) => {
                if (UPGRADES[i] && typeof lvl === 'number' && lvl >= 0 && lvl <= UPGRADES[i].maxLevel)
                    UPGRADES[i].level = lvl;
            });
        }

        if (Array.isArray(data.trees) && data.trees.length > 0) {
            game.trees = data.trees.map(t => ({
                growth:    (typeof t.growth === 'number' && isFinite(t.growth)) ? Math.max(0, Math.min(1, t.growth)) : 0,
                grown:     t.grown    === true,
                clicks:    (typeof t.clicks === 'number') ? t.clicks : 0,
                hasFruit:  t.hasFruit === true,
                shakeTimer: 0, shakeX: 0, readyPing: t.grown === true,
            }));
        }

        // Restore farm state
        if (data.farm && Array.isArray(data.farm.plots) && data.farm.plots.length > 0) {
            game.farm.plots = data.farm.plots.map(p => ({
                growth:    (typeof p.growth === 'number' && isFinite(p.growth)) ? Math.max(0, Math.min(1, p.growth)) : 0,
                grown:     p.grown === true,
                readyPing: p.grown === true,
            }));
        }

        // Restore mine state
        if (data.mine) {
            game.mine.rock.clicks          = typeof data.mine.rockClicks          === 'number' ? data.mine.rockClicks          : 0;
            game.mine.rock.respawnTimer    = typeof data.mine.rockRespawnTimer    === 'number' ? data.mine.rockRespawnTimer    : 0;
            game.mine.cart.stones          = typeof data.mine.cartStones          === 'number' ? data.mine.cartStones          : 0;
            game.mine.cart.state           = ['idle','leaving','away'].includes(data.mine.cartState) ? data.mine.cartState : 'idle';
            game.mine.cart.timer           = typeof data.mine.cartTimer           === 'number' ? data.mine.cartTimer           : 0;
            game.mine.cart.transportStones = typeof data.mine.cartTransportStones === 'number' ? data.mine.cartTransportStones : 0;
            // Snap 'leaving' to 'away' on reload (animation already happened)
            if (game.mine.cart.state === 'leaving') { game.mine.cart.state = 'away'; game.mine.cart.travelX = 0; }
        }
        if (typeof data.stone === 'number' && isFinite(data.stone)) game.stone = data.stone;

        // Restore UI state
        if (UPGRADES[7].level > 0) {
            document.getElementById('tab-farm-btn').style.display = '';
        }
        if (UPGRADES[14].level > 0) {
            document.getElementById('tab-mine-btn').style.display = '';
        }
        if (UPGRADES[4].level > 0 || game.food > 0) {
            document.getElementById('food-hud').classList.remove('hidden');
        }
    } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  TITLE SCREEN
// ═══════════════════════════════════════════════════════════════
function hasSave() {
    try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

function eraseSave() {
    try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function resetGameState() {
    game.wood          = 0;
    game.food          = 0;
    game.firstChopDone = false;
    game.lodgeAccum    = 0;
    game.trees         = [makeTree()];
    game.farm          = { plots: [makePlot()] };
    game.mine          = makeMine();
    game.stone         = 0;
    mineSendCartBtn    = null;
    UPGRADES.forEach(u => u.level = 0);
    document.getElementById('tab-farm-btn').style.display = 'none';
    document.getElementById('tab-mine-btn').style.display = 'none';
    document.getElementById('food-hud').classList.add('hidden');
    document.getElementById('stone-hud').classList.add('hidden');
}

function matchFarmTabHeight() {
    const woodEl = document.getElementById('tab-wood');
    const h = woodEl.offsetHeight + 'px';
    document.getElementById('tab-farm').style.minHeight = h;
    document.getElementById('tab-mine').style.minHeight = h;
}

function startGame() {
    document.getElementById('title-screen').classList.add('hidden');
    buildPanel();
    const ro = new ResizeObserver(() => {
        resizeCanvas();
        requestAnimationFrame(matchFarmTabHeight);
    });
    ro.observe(canvas);
    requestAnimationFrame(() => {
        resizeCanvas();
        initClouds();
        matchFarmTabHeight();
        requestAnimationFrame(loop);
    });
}

let devMaxUsed = false;

function devMaxAll() {
    if (devMaxUsed) {
        game.wood += 10000;
        game.food += 10000;
        updateHUD();
        return;
    }
    devMaxUsed = true;
    UPGRADES.forEach((u, i) => {
        if (i >= 8) return;  // skip Farm tab upgrades
        u.level = u.maxLevel;
    });
    // Apply side-effects of unlocked upgrades
    while (game.trees.length < 1 + UPGRADES[3].maxLevel) game.trees.push(makeTree());
    const farmBtn = document.getElementById('tab-farm-btn');
    farmBtn.style.display = '';
    farmBtn.classList.remove('new');

    for (let i = 0; i < UPGRADES.length; i++) buildCard(i);
    syncPanel();
    updateHUD();
    matchFarmTabHeight();
    saveGame();

    const btn = document.getElementById('dev-max-btn');
    btn.textContent = '⚠ DEV: +10000 WOOD & FOOD';
}

function showTitleScreen() {
    const btnResume      = document.getElementById('btn-resume');
    const confirmOverlay = document.getElementById('confirm-overlay');

    if (hasSave()) {
        btnResume.classList.remove('hidden');
    } else {
        btnResume.classList.add('hidden');
    }

    btnResume.addEventListener('click', () => {
        loadGame();
        startGame();
    });

    document.getElementById('btn-new').addEventListener('click', () => {
        if (hasSave()) {
            confirmOverlay.classList.remove('hidden');
        } else {
            resetGameState();
            startGame();
        }
    });

    document.getElementById('confirm-yes').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
        eraseSave();
        resetGameState();
        startGame();
    });

    document.getElementById('confirm-no').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
    });
}

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
showTitleScreen();
</script>
