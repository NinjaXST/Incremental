const WHEAT_GROW_TIME = 10000; // 10 seconds

const WHEAT_SWIPES_NEEDED = 8;
const WHEAT_FOOD_YIELD    = 100;

function getPlotLayout() {
    const nPlots = game.farm.plots.length;
    const margin = Math.round(W * 0.08);
    const gap    = Math.round(W * 0.02);
    const plotW  = Math.round((W - margin * 2 - gap * (nPlots - 1)) / nPlots);
    return game.farm.plots.map((_, i) => ({
        x: margin + i * (plotW + gap),
        w: plotW,
        cx: margin + i * (plotW + gap) + Math.round(plotW / 2),
    }));
}

function getPlotIdxFromClientX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (W / rect.width);
    const layout = getPlotLayout();
    for (let i = 0; i < layout.length; i++) {
        if (x >= layout[i].x && x <= layout[i].x + layout[i].w) return i;
    }
    // fallback: find nearest
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < layout.length; i++) {
        const dist = Math.abs(x - layout[i].cx);
        if (dist < bestDist) { bestDist = dist; best = i; }
    }
    return best;
}

function harvestWheat(plotIdx) {
    const plot = game.farm.plots[plotIdx];
    if (!plot || !plot.grown) return;
    plot.swipeCount = (plot.swipeCount || 0) + 1;
    if (plot.swipeCount < getSwipesNeeded()) return;
    game.food += WHEAT_FOOD_YIELD * getPureLineMult() * getStoneIrrMult();
    const cx = getPlotLayout()[plotIdx]?.cx ?? W / 2;
    const floatSize = Math.max(14, Math.round(52 / game.farm.plots.length));
    const wheatYield = WHEAT_FOOD_YIELD * getPureLineMult();
    const wheatLabel = Number.isInteger(wheatYield) ? `+${wheatYield} FOOD` : `+${wheatYield.toFixed(1)} FOOD`;
    spawnFloat(cx, Math.round(H * 0.35), wheatLabel, '#E8B020', floatSize);
    plot.growth    = 0;
    plot.grown     = false;
    plot.readyPing = false;
    plot.swipeCount = 0;
    document.getElementById('food-hud').classList.remove('hidden');
    document.getElementById('foodCount').textContent = formatNum(game.food);
    saveGame();
}

function drawPlot(plot, plotX, plotW, plotTop, maxStalkH, ts) {
    // Frame
    ctx.fillStyle = '#2a1808';
    ctx.fillRect(plotX - 4, plotTop - 4, plotW + 8, maxStalkH + 8);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(plotX, plotTop, plotW, maxStalkH);

    // ── Wheat stalks ──
    const numStalks = Math.max(1, Math.round(plotW / (P * 2)));
    const stalkSpacing = plotW / numStalks;
    const stalkH = Math.round(plot.growth * maxStalkH);

    if (stalkH > 2) {
        for (let i = 0; i < numStalks; i++) {
            const sx = Math.round(plotX + stalkSpacing * (i + 0.5));
            const sy = plotTop + maxStalkH;
            const sway = Math.round(Math.sin(ts / 1400 + i * 0.9) * 1.5);

            ctx.fillStyle = '#5a9020';
            ctx.fillRect(sx - 1 + sway, sy - stalkH, 2, stalkH);
            ctx.fillStyle = '#70b030';
            ctx.fillRect(sx + sway, sy - stalkH, 1, stalkH);

            if (plot.growth > 0.80) {
                const headAlpha = Math.min(1, (plot.growth - 0.80) / 0.20);
                const headH = Math.round(P * 2.5);
                ctx.globalAlpha = headAlpha;
                ctx.fillStyle = '#C89020';
                ctx.fillRect(sx - 3 + sway, sy - stalkH - headH, 6, headH);
                ctx.fillStyle = '#E8C040';
                ctx.fillRect(sx - 2 + sway, sy - stalkH - headH - P/2, 4, Math.round(P/2));
                ctx.fillStyle = '#A07010';
                for (let s = 0; s < 3; s++) {
                    ctx.fillRect(sx - 3 + sway + (s % 2 === 0 ? -1 : 3), sy - stalkH - Math.round(headH * (s + 1) / 4), 2, 2);
                }
                ctx.globalAlpha = 1;
            }
        }
    }

    // Glow overlay when ready
    if (plot.grown) {
        const pulse = 0.12 + 0.08 * Math.sin(ts / 350);
        ctx.fillStyle = `rgba(232,176,32,${pulse})`;
        ctx.fillRect(plotX, plotTop, plotW, maxStalkH);
    }

    // ── Progress / harvest bar ──
    const cx    = plotX + Math.round(plotW / 2);
    const barY  = plotTop + maxStalkH + Math.round(H * 0.04);
    const barH2 = Math.round(Math.max(10, Math.min(16, H * 0.025)));
    const fSize = Math.round(Math.max(9, Math.min(16, plotW * 0.12)));

    ctx.fillStyle = '#1a0d05';
    ctx.fillRect(plotX - 2, barY - 2, plotW + 4, barH2 + 4);
    ctx.fillStyle = '#2a1508';
    ctx.fillRect(plotX, barY, plotW, barH2);

    if (!plot.grown) {
        const fillW = Math.round(plot.growth * plotW);
        if (fillW > 0) {
            ctx.fillStyle = '#5a9020';
            ctx.fillRect(plotX, barY, fillW, barH2);
            if (fillW > 3) {
                ctx.fillStyle = '#70b030';
                ctx.fillRect(plotX, barY, fillW - 2, barH2 - 3);
            }
        }
        const secsLeft = ((1 - plot.growth) * getWheatGrowTime() / 1000).toFixed(1);
        ctx.fillStyle = '#6a5030';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        ctx.fillText(`${secsLeft}s`, cx, barY + barH2 + fSize + 2);
    } else {
        ctx.fillStyle = '#c89020';
        ctx.fillRect(plotX, barY, plotW, barH2);
        if (plotW > 3) {
            ctx.fillStyle = '#e8b030';
            ctx.fillRect(plotX, barY, plotW - 2, barH2 - 3);
        }
        const pulse = 0.7 + 0.3 * Math.sin(ts / 350);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#E8C040';
        ctx.font = `bold ${fSize}px "Courier New"`;
        ctx.textAlign = 'center';
        const sc = plot.swipeCount || 0;
        const needed = getSwipesNeeded();
        const harvestLabel = sc > 0 ? `${sc}/${needed}` : '\u21d4 SWIPE';
        ctx.fillText(harvestLabel, cx, barY + barH2 + fSize + 2);
        ctx.globalAlpha = 1;
    }
}

function drawFarmScene(ts) {
    // ── Shared sky background (same as Forest tab) ──
    drawBackground(ts);

    // ── Overlay: darken the lower portion to blend into farm ground ──
    const skyH = Math.round(H * 0.32);  // farm horizon — lower sky, more field
    const fadeH = Math.round(H * 0.10);
    const fadeGrad = ctx.createLinearGradient(0, skyH - fadeH, 0, skyH + fadeH);
    fadeGrad.addColorStop(0, 'rgba(40,20,8,0)');
    fadeGrad.addColorStop(1, 'rgba(40,20,8,1)');
    ctx.fillStyle = fadeGrad;
    ctx.fillRect(0, skyH - fadeH, W, fadeH * 2);

    // ── Hedgerow horizon ──
    ctx.fillStyle = '#2a5c18';
    ctx.fillRect(0, skyH - 10, W, 18);
    ctx.fillStyle = '#1e4810';
    ctx.fillRect(0, skyH + 4, W, 8);

    // ── Windmill (drawn behind ground when purchased) ──
    if (UPGRADES[14].level > 0) {
        const wmCX  = Math.round(W * 0.82);
        const wmBase = skyH + 6;          // sits on the hedgerow
        const towerH = Math.round(H * 0.22);
        const towerWBot = Math.round(W * 0.045);
        const towerWTop = Math.round(W * 0.028);
        const towerTop  = wmBase - towerH;

        // ── Tower (stone base, tapered) ──
        ctx.fillStyle = '#7a6e5a';
        ctx.beginPath();
        ctx.moveTo(wmCX - towerWBot, wmBase);
        ctx.lineTo(wmCX + towerWBot, wmBase);
        ctx.lineTo(wmCX + towerWTop, towerTop);
        ctx.lineTo(wmCX - towerWTop, towerTop);
        ctx.closePath(); ctx.fill();

        // Stone block texture on tower
        ctx.strokeStyle = '#5a5044';
        ctx.lineWidth = 1;
        for (let r = 1; r < 5; r++) {
            const t  = r / 5;
            const wy = wmBase - towerH * t;
            const hw = towerWBot + (towerWTop - towerWBot) * t;
            ctx.beginPath();
            ctx.moveTo(wmCX - hw, wy);
            ctx.lineTo(wmCX + hw, wy);
            ctx.stroke();
        }
        // Vertical seam
        ctx.beginPath();
        ctx.moveTo(wmCX, wmBase); ctx.lineTo(wmCX, towerTop); ctx.stroke();

        // Tower highlight edge
        ctx.fillStyle = '#9a8e78';
        ctx.fillRect(wmCX - towerWBot, wmBase - 2, 3, towerH);

        // ── Cap (wood) ──
        const capH  = Math.round(H * 0.04);
        const capW  = towerWTop + Math.round(W * 0.018);
        ctx.fillStyle = '#7a5228';
        ctx.fillRect(wmCX - capW, towerTop - capH, capW * 2, capH);
        ctx.fillStyle = '#5a3810';
        ctx.fillRect(wmCX - capW, towerTop - capH, capW * 2, 3);
        // Cap overhang highlight
        ctx.fillStyle = '#9a6838';
        ctx.fillRect(wmCX - capW, towerTop - capH, capW * 2, 2);

        // ── Door (arched wood) ──
        const doorW = Math.round(towerWBot * 0.65);
        const doorH = Math.round(towerH * 0.28);
        const doorY = wmBase - doorH;
        ctx.fillStyle = '#3a2010';
        ctx.fillRect(wmCX - doorW / 2, doorY, doorW, doorH);
        ctx.fillStyle = '#5a3818';
        ctx.beginPath();
        ctx.arc(wmCX, doorY, Math.round(doorW / 2), Math.PI, 0);
        ctx.fill();
        // Door frame
        ctx.strokeStyle = '#7a5228';
        ctx.lineWidth = 2;
        ctx.strokeRect(wmCX - doorW / 2, doorY, doorW, doorH);

        // ── Rotating sails ──
        const hubX   = wmCX;
        const hubY   = towerTop + Math.round(capH * 0.4);
        const bladeL = Math.round(H * 0.14);
        const bladeW = Math.round(W * 0.016);
        const rot    = (ts / 2800) * Math.PI * 2 * UPGRADES[14].level;  // faster at higher levels

        ctx.save();
        ctx.translate(hubX, hubY);

        for (let b = 0; b < 4; b++) {
            const angle = rot + b * Math.PI / 2;
            ctx.save();
            ctx.rotate(angle);

            // Sail frame (wood beam)
            ctx.fillStyle = '#7a5228';
            ctx.fillRect(-Math.round(bladeW / 2), -bladeL, bladeW, bladeL);

            // Sail canvas (lighter fill)
            ctx.fillStyle = '#d4b870';
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.round(bladeW * 2.5), -Math.round(bladeL * 0.25));
            ctx.lineTo(Math.round(bladeW * 2.0), -Math.round(bladeL * 0.95));
            ctx.lineTo(0, -bladeL);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        // Hub center
        ctx.fillStyle = '#3a2808';
        ctx.beginPath(); ctx.arc(0, 0, Math.round(W * 0.014), 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#6a4a20';
        ctx.beginPath(); ctx.arc(0, 0, Math.round(W * 0.007), 0, Math.PI * 2); ctx.fill();

        ctx.restore();
    }

    // ── Ground / soil ──
    const groundY = skyH + 12;
    const soilGrad = ctx.createLinearGradient(0, groundY, 0, H);
    soilGrad.addColorStop(0, '#5a3018');
    soilGrad.addColorStop(1, '#2a1508');
    ctx.fillStyle = soilGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    const furrowH = Math.round(H * 0.055);
    for (let r = 0; r * furrowH + groundY < H; r++) {
        ctx.fillStyle = r % 2 === 0 ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.03)';
        ctx.fillRect(0, groundY + r * furrowH, W, furrowH);
    }

    // ── Draw all plots ──
    const plotTop   = groundY + Math.round(H * 0.02);
    const maxStalkH = Math.round(H * 0.52);
    const layout    = getPlotLayout();

    for (let i = 0; i < game.farm.plots.length; i++) {
        drawPlot(game.farm.plots[i], layout[i].x, layout[i].w, plotTop, maxStalkH, ts);
    }

    drawFarmSwipes(plotTop, maxStalkH);
    drawFloats();
}

// ═══════════════════════════════════════════════════════════════
//  FARM SWIPE ANIMATIONS
// ═══════════════════════════════════════════════════════════════
const farmSwipes = [];

function spawnFarmSwipe(plotX, plotW, plotTop, stalkH) {
    farmSwipes.push({
        x:      plotX,
        w:      plotW,
        y:      plotTop + Math.round(stalkH * 0.55),  // mid-stalk height
        life:   1.0,   // 0→1, decreases each frame
        speed:  0.006, // life units per ms
    });
}

function drawFarmSwipes(plotTop, maxStalkH) {
    for (const sw of farmSwipes) {
        const alpha = sw.life;
        const prog  = 1 - sw.life;  // 0=start, 1=end

        // Animated leading edge sweeps left→right
        const sweepX = sw.x + Math.round(sw.w * Math.min(1, prog * 2.2));

        ctx.save();
        ctx.globalAlpha = alpha * 0.85;

        // Arc curve: quadratic bezier from left to sweepX with upward bow
        const arcH = Math.round(maxStalkH * 0.18);
        const midX = sw.x + Math.round((sweepX - sw.x) / 2);

        // Glow blur
        ctx.shadowColor = '#e8d060';
        ctx.shadowBlur  = 6;

        // Main slash line
        ctx.strokeStyle = '#f0e080';
        ctx.lineWidth   = 3;
        ctx.beginPath();
        ctx.moveTo(sw.x, sw.y);
        ctx.quadraticCurveTo(midX, sw.y - arcH, sweepX, sw.y + Math.round(arcH * 0.4));
        ctx.stroke();

        // Bright leading edge dot
        ctx.shadowBlur  = 10;
        ctx.fillStyle   = '#ffffff';
        ctx.beginPath();
        ctx.arc(sweepX, sw.y + Math.round(arcH * 0.4 * (sweepX - sw.x) / sw.w), 3, 0, Math.PI * 2);
        ctx.fill();

        // Trailing sparkle dots along the arc
        for (let d = 0; d < 3; d++) {
            const t  = (d + 1) / 5;
            const bx = sw.x + (sweepX - sw.x) * t;
            const by = sw.y + Math.round((- arcH * 4 * t * (1 - t) + arcH * 0.4 * t));
            ctx.globalAlpha = alpha * (1 - t) * 0.6;
            ctx.fillStyle   = '#e8d060';
            ctx.beginPath();
            ctx.arc(bx, by, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════════════
//  MINE MECHANICS
// ═══════════════════════════════════════════════════════════════
const MINE_ROCK_CLICKS = 20;
const MINE_CART_MAX    = 5;  // base capacity
function getCartMax() { return MINE_CART_MAX + (UPGRADES[15] ? UPGRADES[15].level : 0); }

function getMineRockBounds() {
    const MH = mineH || H;
    const DH = displayH || H;
    const rW = Math.round(W * 0.40);
    const rH = Math.round(MH * 0.30);
    const rX = Math.round(W * 0.58 - rW / 2);  // shifted right of center
    const floorY = MH - Math.round(DH * 0.20);
    const rY = floorY - rH + Math.round(MH * 0.04);  // lower, overlaps floor base slightly
    const cx = rX + Math.round(rW / 2);
    return { x: rX, y: rY, w: rW, h: rH, cx, cy: Math.round(rY + rH / 2) };
}

let mineSendCartBtn = null;

function sendCart() {
    const cart = game.mine.cart;
    if (cart.state !== 'idle' || cart.stones === 0) return;
    cart.state = 'leaving';
    cart.travelX = 0;
    cart.transportStones = cart.stones;
    cart.stones = 0;
    saveGame();
}

function mineRockTap(mx, my) {
    const rock = game.mine.rock;
    // Rock is gone (respawning) — nothing to pick
    if (rock.respawnTimer > 0) return;
    // Already fully mined, waiting for swipe-up load — ignore swipe-down
    if (rock.loaded) return;

    const b = getMineRockBounds();
    // Ellipse hit test
    const dx = (mx - b.cx) / (b.w / 2);
    const dy = (my - b.cy) / (b.h / 2);
    if (dx * dx + dy * dy > 1) return;

    rock.clicks++;
    rock.shakeTimer = 120;
    spawnFloat(b.cx, b.y - 10, '⛏', '#c8a450', 22);

    if (rock.clicks >= getPicksRequired()) {
        rock.loaded = true;  // wait for swipe-up to deposit
    }
    saveGame();
}

function loadRockIntoCart() {
    const rock = game.mine.rock;
    if (!rock.loaded) return;
    const b    = getMineRockBounds();
    const cart = game.mine.cart;

    if (cart.state !== 'idle') {
        spawnFloat(b.cx, b.y - 28, 'CART MISSING', '#e05050', 18);
        return;
    }
    if (cart.stones >= getCartMax()) {
        spawnFloat(b.cx, b.y - 28, 'CART FULL!', '#e05050', 18);
        return;
    }
    // Load stone
    rock.loaded       = false;
    rock.clicks       = 0;
    rock.respawnTimer = getRockRespawnTime();

    if (!game.mine.firstLoadDone) {
        game.mine.firstLoadDone  = true;
        game.mine.firstBonusTimer = 2800;
        const bonus = Math.min(5, getCartMax() - cart.stones);
        cart.stones += bonus;
    } else {
        cart.stones++;
        spawnFloat(b.cx, b.y - 28, 'LOADED!', '#a0b8c8', 18);
    }
    saveGame();
}

// ═══════════════════════════════════════════════════════════════
//  MINE SCENE
// ═══════════════════════════════════════════════════════════════
function drawMineScene(ts) {
    // ── Cave background ──
    ctx.fillStyle = '#0d0b08';
    ctx.fillRect(0, 0, W, H);

    // Rocky ceiling
    const ceilH = Math.round(H * 0.12);
    ctx.fillStyle = '#2a2018';
    ctx.fillRect(0, 0, W, ceilH);
    // Ceiling jagged edge
    ctx.fillStyle = '#1a1410';
    for (let x = 0; x < W; x += Math.round(W / 18)) {
        const jH = Math.round(ceilH * (0.5 + 0.5 * Math.sin(x * 0.07 + 1.2)));
        ctx.fillRect(x, ceilH - jH, Math.round(W / 18) + 1, jH);
    }

    // Rocky floor — anchored near the visible bottom
    const floorY = H - Math.round(displayH * 0.20);
    ctx.fillStyle = '#2a2018';
    ctx.fillRect(0, floorY, W, H - floorY);
    ctx.fillStyle = '#1a1410';
    for (let x = 0; x < W; x += Math.round(W / 14)) {
        const jH = Math.round(H * 0.04 * (0.5 + 0.5 * Math.sin(x * 0.11)));
        ctx.fillRect(x, floorY, Math.round(W / 14) + 1, jH);
    }

    // ── Stone wall texture (left & right) ──
    const wallW = Math.round(W * 0.08);
    ctx.fillStyle = '#221a10';
    ctx.fillRect(0, ceilH, wallW, floorY - ceilH);
    ctx.fillRect(W - wallW, ceilH, wallW, floorY - ceilH);
    // Stone blocks
    ctx.fillStyle = '#2e2416';
    for (let y = ceilH; y < floorY; y += Math.round(H * 0.1)) {
        ctx.fillRect(0, y, wallW, 2);
        ctx.fillRect(W - wallW, y, wallW, 2);
    }

    // ── Mine track ──
    const trackY = floorY - Math.round(H * 0.05);
    const tieW   = Math.round(W * 0.04);
    const tieH   = Math.round(H * 0.025);
    const tieGap = Math.round(W * 0.07);
    ctx.fillStyle = '#5a3a18';
    for (let x = wallW; x < W - wallW - tieW; x += tieGap) {
        ctx.fillRect(x, trackY, tieW, tieH);
    }
    // Rails
    ctx.fillStyle = '#707880';
    ctx.fillRect(wallW, trackY + 3, W - wallW * 2, 3);
    ctx.fillStyle = '#909aa0';
    ctx.fillRect(wallW, trackY + 3, W - wallW * 2, 1);
    ctx.fillStyle = '#707880';
    ctx.fillRect(wallW, trackY + tieH - 4, W - wallW * 2, 3);
    ctx.fillStyle = '#909aa0';
    ctx.fillRect(wallW, trackY + tieH - 4, W - wallW * 2, 1);

    // ── Torches ──
    const torchPositions = [Math.round(W * 0.2), Math.round(W * 0.5), Math.round(W * 0.8)];
    for (const tx of torchPositions) {
        const torchY = Math.round(ceilH + H * 0.08);
        // Glow
        const glow = 0.06 + 0.04 * Math.sin(ts / 300 + tx);
        const grad = ctx.createRadialGradient(tx, torchY, 0, tx, torchY, Math.round(W * 0.18));
        grad.addColorStop(0, `rgba(255,160,40,${glow + 0.08})`);
        grad.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(tx - Math.round(W * 0.18), torchY - Math.round(H * 0.1), Math.round(W * 0.36), Math.round(H * 0.4));
        // Torch stick
        ctx.fillStyle = '#5a3010';
        ctx.fillRect(tx - 2, torchY, 4, Math.round(H * 0.06));
        // Flame
        ctx.fillStyle = '#ff8020';
        ctx.fillRect(tx - 3, torchY - Math.round(H * 0.04), 6, Math.round(H * 0.04));
        ctx.fillStyle = '#ffcc40';
        ctx.fillRect(tx - 1, torchY - Math.round(H * 0.05), 2, Math.round(H * 0.03));
    }

    // ── Depth shaft (vanishing point) ──
    const vpX = Math.round(W / 2);
    const vpY = Math.round(H * 0.42);
    ctx.strokeStyle = '#3a2c18';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wallW, ceilH); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - wallW, ceilH); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wallW, floorY); ctx.lineTo(vpX, vpY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - wallW, floorY); ctx.lineTo(vpX, vpY); ctx.stroke();

    // ── Mine Cart ──
    {
        const wheelR   = Math.round(H * 0.034);
        const cartHW   = Math.round(W * 0.11);
        const cartBH   = Math.round(H * 0.10);
        const cartHome = wallW + Math.round(W * 0.14);  // home center x
        const cart     = game.mine.cart;
        const cartCX   = cartHome + Math.round(cart.travelX);
        const wheelCY  = trackY + tieH - 4 - wheelR;
        const bodyTop  = wheelCY - wheelR - cartBH;
        const bodyL    = cartCX - cartHW;
        const bodyR    = cartCX + cartHW;

        if (cart.state !== 'depositing' && cart.state !== 'returning') {
            // Wheels
            for (const wx of [cartCX - cartHW + wheelR + 2, cartCX + cartHW - wheelR - 2]) {
                ctx.fillStyle = '#1e1a10';
                ctx.beginPath(); ctx.arc(wx, wheelCY, wheelR, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#504838';
                ctx.beginPath(); ctx.arc(wx, wheelCY, wheelR - 2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#302820';
                ctx.beginPath(); ctx.arc(wx, wheelCY, Math.round(wheelR * 0.45), 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#686050';
                ctx.beginPath(); ctx.arc(wx, wheelCY, 1, 0, Math.PI * 2); ctx.fill();
            }

            // Cart body
            const slant = Math.round(cartBH * 0.12);
            ctx.fillStyle = '#302818';
            ctx.beginPath();
            ctx.moveTo(bodyL,         bodyTop);
            ctx.lineTo(bodyR,         bodyTop);
            ctx.lineTo(bodyR - slant, wheelCY - wheelR);
            ctx.lineTo(bodyL + slant, wheelCY - wheelR);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#1e1810';
            ctx.beginPath();
            ctx.moveTo(bodyL + 4,          bodyTop + 4);
            ctx.lineTo(bodyR - 4,          bodyTop + 4);
            ctx.lineTo(bodyR - slant - 2,  wheelCY - wheelR - 4);
            ctx.lineTo(bodyL + slant + 2,  wheelCY - wheelR - 4);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#706050';
            ctx.fillRect(bodyL, bodyTop,     cartHW * 2, 3);
            ctx.fillStyle = '#504030';
            ctx.fillRect(bodyL, bodyTop + 3, 3, cartBH - 6);
            ctx.fillRect(bodyR - 3, bodyTop + 3, 3, cartBH - 6);

            ctx.fillStyle = '#808878';
            for (let rv = 0; rv < 3; rv++) {
                const rvX = bodyL + Math.round(cartHW * 2 * (rv + 1) / 4);
                ctx.fillRect(rvX - 1, bodyTop + 6, 2, 2);
            }

            // Stone slots
            const stonesNow  = cart.stones;
            const cartMax    = getCartMax();
            const slotW      = Math.round((cartHW * 2 - 10) / cartMax);
            const slotH      = Math.round(cartBH * 0.48);
            const slotStartY = bodyTop + Math.round(cartBH * 0.28);
            for (let s = 0; s < cartMax; s++) {
                const slotX = bodyL + 5 + s * slotW;
                if (s < stonesNow) {
                    ctx.fillStyle = '#686058';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, slotH);
                    ctx.fillStyle = '#888070';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, 2);
                    ctx.fillStyle = '#484038';
                    ctx.fillRect(slotX, slotStartY + slotH - 2, slotW - 2, 2);
                } else {
                    ctx.fillStyle = '#141008';
                    ctx.fillRect(slotX, slotStartY, slotW - 2, slotH);
                }
            }

            // Stone count
            const lblSize = Math.max(9, Math.round(H * 0.028));
            ctx.font      = `bold ${lblSize}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = stonesNow >= cartMax ? '#e05050' : '#c8b880';
            ctx.fillText(`${stonesNow}/${cartMax}`, cartCX, bodyTop - 4);

            // SEND CART button (only when idle with at least 1 stone)
            if (cart.state === 'idle') {
                const btnW   = Math.round(cartHW * 2.2);
                const btnH   = Math.round(H * 0.055);
                const btnX   = cartHome - Math.round(btnW / 2);
                const btnY   = bodyTop - Math.round(H * 0.065) - btnH;
                const canSend = cart.stones > 0;
                // Store bounds for hit testing (use home position, not animated)
                mineSendCartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

                ctx.fillStyle = canSend ? '#4a3820' : '#1e1a12';
                ctx.fillRect(btnX, btnY, btnW, btnH);
                ctx.fillStyle = canSend ? '#7a6030' : '#302818';
                ctx.fillRect(btnX, btnY, btnW, 2);
                ctx.fillRect(btnX, btnY, 2, btnH);
                ctx.fillStyle = canSend ? '#2a1e0c' : '#141008';
                ctx.fillRect(btnX, btnY + btnH - 2, btnW, 2);
                ctx.fillRect(btnX + btnW - 2, btnY, 2, btnH);

                const btnFontSize = Math.max(9, Math.round(H * 0.026));
                ctx.font      = `bold ${btnFontSize}px 'Courier New'`;
                ctx.textAlign = 'center';
                ctx.fillStyle = canSend ? '#e8c060' : '#504030';
                ctx.fillText('SEND CART', cartHome, btnY + Math.round(btnH * 0.68));
            } else {
                mineSendCartBtn = null;
            }
        } else {
            // Cart is away — clear button and show phase countdown
            mineSendCartBtn = null;
            const secs    = Math.ceil(cart.timer / 1000);
            const countCX = cartHome;
            const countCY = wheelCY - Math.round(cartBH * 0.5);
            const fSz     = Math.max(10, Math.round(H * 0.030));
            const labelSz = Math.max(8, Math.round(fSz * 0.72));
            ctx.font      = `bold ${labelSz}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#7a6840';
            ctx.fillText(cart.state === 'depositing' ? 'DEPOSITING IN' : 'RETURNING IN', countCX, countCY - fSz);
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${secs}s`, countCX, countCY + Math.round(fSz * 0.4));
        }
    }

    // ── Large Rock ──
    {
        const b    = getMineRockBounds();
        const rock = game.mine.rock;

        if (rock.respawnTimer > 0) {
            // Rock is destroyed — show respawn countdown
            const secs  = Math.ceil(rock.respawnTimer / 1000);
            const fSz   = Math.max(12, Math.round(H * 0.032));
            ctx.font      = `bold ${fSz}px 'Courier New'`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#5a4e30';
            ctx.fillText('NEW ROCK IN', b.cx, b.cy - Math.round(fSz * 0.5));
            ctx.fillStyle = '#c8a450';
            ctx.fillText(`${secs}s`, b.cx, b.cy + Math.round(fSz * 0.9));
        } else {

        const sx   = rock.shakeTimer > 0 ? rock.shakeX : 0;
        const prog = rock.clicks / getPicksRequired();

        ctx.save();
        ctx.translate(sx, 0);

        // Base rock body
        ctx.beginPath();
        ctx.ellipse(b.cx, b.cy, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#4a4030';
        ctx.fill();

        // Mid tone texture blob
        ctx.beginPath();
        ctx.ellipse(b.cx - b.w * 0.08, b.cy - b.h * 0.1, b.w * 0.32, b.h * 0.28, -0.25, 0, Math.PI * 2);
        ctx.fillStyle = '#5c5040';
        ctx.fill();

        // Highlight (top-left)
        ctx.beginPath();
        ctx.ellipse(b.cx - b.w * 0.15, b.cy - b.h * 0.2, b.w * 0.2, b.h * 0.15, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = '#706050';
        ctx.fill();

        // Shadow (bottom-right)
        ctx.beginPath();
        ctx.ellipse(b.cx + b.w * 0.12, b.cy + b.h * 0.18, b.w * 0.22, b.h * 0.18, 0.35, 0, Math.PI * 2);
        ctx.fillStyle = '#302820';
        ctx.fill();

        // Pixel specular dots
        ctx.fillStyle = '#908060';
        ctx.fillRect(b.cx - Math.round(b.w * 0.18), b.cy - Math.round(b.h * 0.26), 4, 3);
        ctx.fillRect(b.cx - Math.round(b.w * 0.06), b.cy - Math.round(b.h * 0.30), 2, 2);
        ctx.fillStyle = '#a09070';
        ctx.fillRect(b.cx - Math.round(b.w * 0.20), b.cy - Math.round(b.h * 0.28), 2, 2);

        // Swipe hint
        {
            const hintSz = Math.max(9, Math.round(mineH * 0.024));
            ctx.font      = `bold ${hintSz}px 'Courier New'`;
            ctx.textAlign = 'center';
            if (rock.loaded) {
                // Flash SWIPE UP
                const flash = Math.sin(ts / 300) > 0;
                if (flash) {
                    ctx.fillStyle = 'rgba(160,200,255,0.90)';
                    ctx.fillText('▲ SWIPE UP ▲', b.cx, b.y + b.h - Math.round(hintSz * 0.6));
                }
            } else {
                ctx.fillStyle = 'rgba(200,180,120,0.50)';
                ctx.fillText('▼ SWIPE DOWN ▼', b.cx, b.y + b.h - Math.round(hintSz * 0.6));
            }
        }

        // Crack lines (revealed progressively)
        ctx.lineWidth = 2;
        if (prog >= 0.2) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx - 4, b.cy - Math.round(b.h * 0.08));
            ctx.lineTo(b.cx - Math.round(b.w * 0.18), b.cy + Math.round(b.h * 0.15));
            ctx.stroke();
        }
        if (prog >= 0.35) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx + 6, b.cy + Math.round(b.h * 0.02));
            ctx.lineTo(b.cx + Math.round(b.w * 0.20), b.cy - Math.round(b.h * 0.12));
            ctx.stroke();
        }
        if (prog >= 0.5) {
            ctx.strokeStyle = '#151008'; ctx.beginPath();
            ctx.moveTo(b.cx - 6, b.cy + Math.round(b.h * 0.06));
            ctx.lineTo(b.cx - Math.round(b.w * 0.10), b.cy + Math.round(b.h * 0.22));
            ctx.lineTo(b.cx - Math.round(b.w * 0.22), b.cy + Math.round(b.h * 0.14));
            ctx.stroke();
        }
        if (prog >= 0.65) {
            ctx.strokeStyle = '#1a140a'; ctx.beginPath();
            ctx.moveTo(b.cx + 4, b.cy - Math.round(b.h * 0.04));
            ctx.lineTo(b.cx + Math.round(b.w * 0.12), b.cy + Math.round(b.h * 0.18));
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.08), b.cy - Math.round(b.h * 0.18));
            ctx.lineTo(b.cx + Math.round(b.w * 0.02), b.cy + Math.round(b.h * 0.04));
            ctx.stroke();
        }
        if (prog >= 0.8) {
            ctx.strokeStyle = '#100d06'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.04), b.cy - Math.round(b.h * 0.32));
            ctx.lineTo(b.cx + Math.round(b.w * 0.06), b.cy + Math.round(b.h * 0.28));
            ctx.stroke();
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.cx - Math.round(b.w * 0.14), b.cy - Math.round(b.h * 0.05));
            ctx.lineTo(b.cx + Math.round(b.w * 0.08), b.cy - Math.round(b.h * 0.20));
            ctx.stroke();
        }

        ctx.restore();

        // ── Progress pips below rock ──
        const pipSz  = 7;
        const pipGap = 5;
        const picksReq = getPicksRequired();
        const totalPW = picksReq * (pipSz + pipGap) - pipGap;
        const pipX0  = b.cx - Math.round(totalPW / 2);
        const pipY0  = b.y + b.h + Math.round(H * 0.004);
        for (let p = 0; p < picksReq; p++) {
            ctx.fillStyle = p < rock.clicks ? '#c8a450' : '#2e2618';
            ctx.fillRect(pipX0 + p * (pipSz + pipGap), pipY0, pipSz, pipSz);
        }
        // Pip border
        ctx.strokeStyle = '#1a1408';
        ctx.lineWidth = 1;
        for (let p = 0; p < picksReq; p++) {
            ctx.strokeRect(pipX0 + p * (pipSz + pipGap), pipY0, pipSz, pipSz);
        }

        } // end else (rock present)
    }

    // ── Mining Buddy ──
    if (UPGRADES[21] && UPGRADES[21].level > 0) {
        const b    = getMineRockBounds();
        const rock = game.mine.rock;
        const p    = Math.max(3, Math.round(b.h / 13));

        // Anchor: stand with feet at rock bottom, just right of rock
        const bx = Math.round(b.x + b.w + p * 1.5); // character left edge
        const fy = Math.round(b.y + b.h);            // feet y

        // Level indicator above character
        const buddyLvl = UPGRADES[21].level;
        const lvlFsz   = Math.max(8, Math.round(p * 1.4));
        ctx.font      = `900 ${lvlFsz}px 'Courier New'`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#c8a450';
        ctx.fillText(`LV${buddyLvl}`, bx + Math.round(p * 1.5), fy - p * 14 - Math.round(lvlFsz * 0.3));

        // Hard hat brim
        ctx.fillStyle = '#c87820';
        ctx.fillRect(bx - p,         fy - p * 11, p * 5, p);
        // Hard hat dome
        ctx.fillStyle = '#e09030';
        ctx.fillRect(bx,             fy - p * 13, p * 3, p * 2);
        // Hard hat highlight
        ctx.fillStyle = '#f0b040';
        ctx.fillRect(bx + p,         fy - p * 13, p,     Math.round(p * 0.6));

        // Face (skin)
        ctx.fillStyle = '#d4906a';
        ctx.fillRect(bx + p,         fy - p * 10, p * 2, p * 2);


        // Body (blue shirt)
        ctx.fillStyle = '#385898';
        ctx.fillRect(bx + p,         fy - p * 8,  p * 2, p * 4);

        // Left arm (forward toward rock)
        ctx.fillStyle = '#2a4070';
        ctx.fillRect(bx,             fy - p * 8,  p,     p * 3);

        // Right arm (raised, holding pickaxe handle)
        ctx.fillStyle = '#2a4070';
        ctx.fillRect(bx + p * 3,     fy - p * 10, p,     p * 3);

        // Belt
        ctx.fillStyle = '#5a3810';
        ctx.fillRect(bx + p,         fy - p * 4,  p * 2, Math.round(p * 0.8));

        // Legs
        const legH = Math.round(p * 3.3);
        ctx.fillStyle = '#1e2a38';
        ctx.fillRect(bx + p,         fy - legH, p - 1, legH);
        ctx.fillRect(bx + p * 2 + 1, fy - legH, p - 1, legH);

        // Boots
        ctx.fillStyle = '#3a2410';
        ctx.fillRect(bx + p - 2,     fy - p,      p + 2, p);
        ctx.fillRect(bx + p * 2,     fy - p,      p + 2, p);

        // Pickaxe handle (held diagonally toward rock)
        ctx.fillStyle = '#8c5c28';
        ctx.fillRect(bx + p * 3 + 1, fy - p * 13, p - 1, p * 6);

        // Pickaxe head
        const phX = bx + p * 3 + 1 - Math.round(p * 1.5);
        const phY = fy - p * 13;
        ctx.fillStyle = '#808888';
        ctx.fillRect(phX,            phY,          p * 4, p);
        // Highlight
        ctx.fillStyle = '#b0baba';
        ctx.fillRect(phX,            phY,          p * 2, Math.round(p * 0.4));
        // Pick tip (left end, pointing toward rock)
        ctx.fillStyle = '#d0d8d8';
        ctx.fillRect(phX - p,        phY + Math.round(p * 0.3), p, Math.round(p * 0.5));

        // ── Spark flash on pick ──
        if (game.mine.buddySparkTimer > 0) {
            const frac  = game.mine.buddySparkTimer / 350; // 1→0 as it fades out
            const alpha = frac;
            const starX = Math.round(b.x + b.w + p * 0.5);
            const starY = Math.round(b.cy - b.h * 0.1);
            const r     = Math.max(4, Math.round(p * 1.4 * frac + p * 0.4));
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(starX - 1, starY - r, 2, r * 2);
            ctx.fillRect(starX - r, starY - 1, r * 2, 2);
            ctx.fillStyle = '#ffe080';
            const d = Math.round(r * 0.5);
            ctx.fillRect(starX - d, starY - d, d, d);
            ctx.fillRect(starX + 1, starY - d, d, d);
            ctx.fillRect(starX - d, starY + 1, d, d);
            ctx.fillRect(starX + 1, starY + 1, d, d);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(starX - 1, starY - 1, 3, 3);
            ctx.globalAlpha = 1;
        }
    }

    // ── First-load bonus glow overlay ──
    if (game.mine.firstBonusTimer > 0) {
        const frac  = game.mine.firstBonusTimer / 2800;
        // Fade in quickly, hold, then fade out in last 20%
        const alpha = frac < 0.2 ? frac / 0.2 : 1;
        const pulse = Math.abs(Math.sin(frac * Math.PI * 6));
        ctx.fillStyle = `rgba(255, 220, 40, ${frac * pulse * 0.30})`;
        ctx.fillRect(0, 0, W, H);
        const b = getMineRockBounds();
        const ringR = Math.round(b.w * (0.6 + (1 - frac) * 1.2));
        ctx.strokeStyle = `rgba(255, 200, 0, ${frac * 0.7})`;
        ctx.lineWidth = Math.max(2, Math.round(6 * frac));
        ctx.beginPath();
        ctx.arc(b.cx, b.cy, ringR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;

        // Static centred text — positioned in visible screen space
        // Inside drawMineScene, canvas is translated by (displayH - mineH),
        // so to hit screen-y sy, use mine-y = sy + mineH - displayH
        const cx    = Math.round(W / 2);
        const screenCY = Math.round(displayH * 0.42);
        const cy    = screenCY + mineH - displayH;
        const sz1   = Math.max(13, Math.round(W * 0.048));
        const sz2   = Math.max(16, Math.round(W * 0.065));
        ctx.textAlign   = 'center';
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = 'rgba(0,0,0,0.45)';
        ctx.fillRect(cx - Math.round(W * 0.42), cy - sz1 - 4, Math.round(W * 0.84), sz1 + sz2 + 22);
        ctx.font        = `900 ${sz1}px 'Courier New'`;
        ctx.fillStyle   = '#ffe060';
        ctx.fillText('✦ FIRST LOAD BONUS ✦', cx, cy);
        ctx.font        = `900 ${sz2}px 'Courier New'`;
        ctx.fillStyle   = '#ffcc00';
        ctx.fillText('×5 STONES!', cx, cy + sz2 + 8);
        ctx.globalAlpha = 1;
        ctx.textAlign   = 'left';
    }

    drawFloats();
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = 0;
let lastHudSync = 0;

function chopTree(tree, cx) {
    const gained = getWoodMultiplier() * getLeafLitterMult() * getStoneMulchMult();
    game.wood += gained;
    const wLabel = gained % 1 === 0 ? `+${gained} WOOD` : `+${gained.toFixed(2)} WOOD`;
    if (activeTab === 'wood') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 20, wLabel, '#c8a450');

    if (tree.hasFruit) {
        const foodGained = getFoodMultiplier() * getCropRotMult() * getStoneIrrMult();
        game.food += foodGained;
        const fLabel = foodGained % 1 === 0 ? `+${foodGained} FOOD` : `+${foodGained.toFixed(2)} FOOD`;
        if (activeTab === 'wood') spawnFloat(cx, GROUND - TREE_ART[3].length * P - 36, fLabel, '#e07020');
    }

    game.firstChopDone = true;
    tree.clicks     = 0;
    tree.growth     = 0;
    tree.grown      = false;
    tree.readyPing  = false;
    tree.shakeTimer = 0;
    tree.hasFruit   = false;
}

function loop(ts) {
    const dt = lastTs ? ts - lastTs : 0;
    lastTs = ts;

    const growTime = getGrowTime();
    const centers  = treeCenters();

    // Grow trees & assign fruit when ready
    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = centers[i];

        if (!tree.grown) {
            tree.growth = Math.min(1, tree.growth + dt / growTime);
            if (tree.growth >= 1 && !tree.readyPing) {
                tree.grown     = true;
                tree.readyPing = true;
                // Roll fruit chance
                const fc = getFruitChance();
                if (fc > 0 && Math.random() < fc) tree.hasFruit = true;
            }
        }

        if (tree.shakeTimer > 0) {
            tree.shakeTimer -= dt;
            tree.shakeX = Math.sin(tree.shakeTimer / 25) * 4;
        }
    }

    // Forester's Lodge auto-chop
    const lodgeCPS = getLodgeCPS();
    if (lodgeCPS > 0) {
        game.lodgeAccum += dt * lodgeCPS / 1000;
        while (game.lodgeAccum >= 1) {
            game.lodgeAccum -= 1;
            const ctrs = treeCenters();
            const candidates = game.trees.map((t, i) => ({ t, i })).filter(({ t }) => t.grown);
            if (candidates.length > 0) {
                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                const lt = pick.t;
                const lcx = ctrs[pick.i];
                lt.clicks++;
                lt.shakeTimer = 150;
                if (lt.clicks >= getClicksNeeded()) {
                    chopTree(lt, lcx);
                    saveGame();
                }
            }
        }
    }

    // Windmill auto-swipe
    const windmillRates = [0, 1/4.5, 1/3.5, 1/2.5, 1/1.5, 1/0.5];  // swipes per second per level
    const windmillSPS = windmillRates[UPGRADES[14].level] || 0;
    if (windmillSPS > 0) {
        game.windmillAccum += dt * windmillSPS / 1000;
        while (game.windmillAccum >= 1) {
            game.windmillAccum -= 1;
            const grownPlots = game.farm.plots.map((p, i) => i).filter(i => game.farm.plots[i].grown);
            if (grownPlots.length > 0) {
                const idx     = grownPlots[Math.floor(Math.random() * grownPlots.length)];
                const layout  = getPlotLayout();
                const plotTop = Math.round(H * 0.30);
                const stalkH  = Math.round(H * 0.42);
                spawnFarmSwipe(layout[idx].x, layout[idx].w, plotTop, stalkH);
                harvestWheat(idx);
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.35;
        p.life -= dt / 550;
        if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i];
        f.y    -= dt * 0.035;
        f.life -= dt / 1600;
        if (f.life <= 0) floats.splice(i, 1);
    }

    for (let i = farmSwipes.length - 1; i >= 0; i--) {
        farmSwipes[i].life -= dt * farmSwipes[i].speed;
        if (farmSwipes[i].life <= 0) farmSwipes.splice(i, 1);
    }

    // Mine first-bonus glow timer
    if (game.mine.firstBonusTimer > 0) game.mine.firstBonusTimer = Math.max(0, game.mine.firstBonusTimer - dt);

    // Mine rock shake / respawn
    if (game.mine.rock.shakeTimer > 0) {
        game.mine.rock.shakeTimer -= dt;
        game.mine.rock.shakeX = Math.sin(game.mine.rock.shakeTimer * 0.4) * 3;
    }
    if (game.mine.rock.respawnTimer > 0) {
        game.mine.rock.respawnTimer = Math.max(0, game.mine.rock.respawnTimer - dt);
    }

    // Mine cart travel / return timer
    {
        const cart = game.mine.cart;
        if (cart.state === 'leaving') {
            cart.travelX += dt * (W * 0.0014);
            if (cart.travelX > W) {
                cart.state = 'depositing';
                cart.timer = getCartTripTime();
            }
        } else if (cart.state === 'depositing') {
            cart.timer = Math.max(0, cart.timer - dt);
            if (cart.timer <= 0) {
                const gained = Math.floor(cart.transportStones * getBrickEffMult());
                game.stone += gained;
                cart.transportStones = 0;
                cart.state = 'returning';
                cart.timer = getCartTripTime();
                spawnFloat(W / 2, (mineH - displayH) + Math.round(displayH * 0.15), `+${gained} 🗻`, '#a0c8e0', 28);
                updateHUD();
                saveGame();
            }
        } else if (cart.state === 'returning') {
            cart.timer = Math.max(0, cart.timer - dt);
            if (cart.timer <= 0) {
                cart.state = 'idle';
                cart.travelX = 0;
                saveGame();
            }
        }
    }

    // Mining Buddy auto-pick & auto-load
    if (UPGRADES[21] && UPGRADES[21].level > 0) {
        const rock = game.mine.rock;
        if (rock.respawnTimer <= 0 && !rock.loaded) {
            // Auto-pick
            game.mine.buddyPickAccum += dt;
            if (game.mine.buddyPickAccum >= getBuddyPickInterval()) {
                game.mine.buddyPickAccum = 0;
                rock.clicks++;
                rock.shakeTimer = 120;
                game.mine.buddySparkTimer = 350; // ms — flash duration
                const b = getMineRockBounds();
                spawnFloat(b.cx, b.y - 10, '⛏', '#c8a450', 22);
                if (rock.clicks >= getPicksRequired()) {
                    rock.loaded = true;
                    game.mine.buddyLoadAccum = 0;
                }
                saveGame();
            }
        } else if (rock.loaded) {
            // Auto-load into cart after delay
            game.mine.buddyLoadAccum += dt;
            if (game.mine.buddyLoadAccum >= getBuddyLoadDelay()) {
                game.mine.buddyLoadAccum = 0;
                if (game.mine.cart.state === 'idle' && game.mine.cart.stones < getCartMax()) {
                    loadRockIntoCart();
                }
            }
        } else {
            // Rock respawning — reset accumulators
            game.mine.buddyPickAccum = 0;
            game.mine.buddyLoadAccum = 0;
        }
        if (game.mine.buddySparkTimer > 0) game.mine.buddySparkTimer = Math.max(0, game.mine.buddySparkTimer - dt);


        // Auto-send cart when full
        const cart = game.mine.cart;
        if (cart.state === 'idle' && cart.stones >= getCartMax()) {
            game.mine.buddySendAccum += dt;
            if (game.mine.buddySendAccum >= getBuddySendDelay()) {
                game.mine.buddySendAccum = 0;
                sendCart();
            }
        } else {
            game.mine.buddySendAccum = 0;
        }
    }

    // Grow wheat plots regardless of active tab
    for (const plot of game.farm.plots) {
        if (!plot.grown) {
            plot.growth = Math.min(1, plot.growth + dt / getWheatGrowTime());
            if (plot.growth >= 1 && !plot.readyPing) {
                plot.grown     = true;
                plot.readyPing = true;
            }
        }
    }

    ctx.clearRect(0, 0, W, displayH);
    if (activeTab === 'farm') {
        drawFarmScene(ts);
        if (ts - lastHudSync >= 200) { updateHUD(); syncPanel(); lastHudSync = ts; }
    } else if (activeTab === 'mine') {
        ctx.save();
        ctx.translate(0, displayH - mineH);
        H = mineH;
        drawMineScene(ts);
        drawFloats();
        H = displayH;
        ctx.restore();
        if (ts - lastHudSync >= 200) { updateHUD(); syncPanel(); lastHudSync = ts; }
    } else {
        drawBackground(ts);
        drawCabin(ts);
        drawAllTrees(ts);
        drawParticles();
        drawFloats();
        drawUI(ts);
        syncPanel();
    }

    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
function handleTap(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const mx   = (clientX - rect.left) * (W / rect.width);
    const my   = (clientY - rect.top)  * (H / rect.height);
    const ctrs = treeCenters();

    for (let i = 0; i < game.trees.length; i++) {
        const tree = game.trees[i];
        const cx   = ctrs[i];
        if (!tree.grown || !hitTest(mx, my, cx, tree)) continue;

        tree.clicks++;
        tree.shakeTimer = 280;
        spawnChips(mx, my);

        if (tree.clicks >= getClicksNeeded()) {
            chopTree(tree, cx);
            saveGame();
        }
        break;
    }
}

let swipeStartX = null;
let mineSwipeStart = null;  // { x, y } in canvas coords

function handleMineSwipeStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    mineSwipeStart = {
        x: (clientX - rect.left) * (W / rect.width),
        y: (clientY - rect.top)  * (displayH / rect.height) + (mineH - displayH),
    };
}

function handleMineSwipeEnd(clientX, clientY) {
    if (!mineSwipeStart) return;
    const rect  = canvas.getBoundingClientRect();
    const ex    = (clientX - rect.left) * (W / rect.width);
    const ey    = (clientY - rect.top)  * (displayH / rect.height) + (mineH - displayH);
    const dx    = ex - mineSwipeStart.x;
    const dy    = ey - mineSwipeStart.y;
    const start = mineSwipeStart;
    mineSwipeStart = null;

    // Check SEND CART button (short tap counts too)
    if (mineSendCartBtn && game.mine.cart.state === 'idle') {
        const b2 = mineSendCartBtn;
        if (start.x >= b2.x && start.x <= b2.x + b2.w && start.y >= b2.y && start.y <= b2.y + b2.h) {
            sendCart(); return;
        }
    }

    const minDist = mineH * 0.06;
    const isVertical = Math.abs(dy) > Math.abs(dx);
    if (isVertical && dy > minDist) {
        mineRockTap(start.x, start.y);   // swipe down → pick
    } else if (isVertical && dy < -minDist) {
        loadRockIntoCart();               // swipe up → load into cart
    }
}

canvas.addEventListener('click', (e) => {
    if (activeTab === 'wood') handleTap(e.clientX, e.clientY);
});

canvas.addEventListener('mousedown', (e) => {
    if (activeTab === 'farm') swipeStartX = e.clientX;
    else if (activeTab === 'mine') handleMineSwipeStart(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.clientX - swipeStartX) > W * 0.15)
            harvestWheat(getPlotIdxFromClientX(swipeStartX));
        swipeStartX = null;
    } else if (activeTab === 'mine') {
        handleMineSwipeEnd(e.clientX, e.clientY);
    }
});

canvas.addEventListener('touchstart', (e) => {
    if (activeTab === 'farm') {
        swipeStartX = e.changedTouches[0].clientX;
    } else if (activeTab === 'mine') {
        e.preventDefault();
        handleMineSwipeStart(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    } else {
        e.preventDefault();
        handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (activeTab === 'farm' && swipeStartX !== null) {
        if (Math.abs(e.changedTouches[0].clientX - swipeStartX) > W * 0.15)
            harvestWheat(getPlotIdxFromClientX(swipeStartX));
        swipeStartX = null;
    } else if (activeTab === 'mine') {
        e.preventDefault();
        handleMineSwipeEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    const my   = (e.clientY - rect.top)  * (H / rect.height);
    if (activeTab === 'mine') {
        // Check SEND CART button
        if (mineSendCartBtn && game.mine.cart.stones > 0 &&
            mx >= mineSendCartBtn.x && mx <= mineSendCartBtn.x + mineSendCartBtn.w &&
            my >= mineSendCartBtn.y && my <= mineSendCartBtn.y + mineSendCartBtn.h) {
            canvas.style.cursor = 'pointer'; return;
        }
        const b  = getMineRockBounds();
        const dx = (mx - b.cx) / (b.w / 2);
        const dy = (my - b.cy) / (b.h / 2);
        canvas.style.cursor = (dx * dx + dy * dy <= 1 && game.mine.rock.respawnTimer <= 0) ? 'crosshair' : 'default';
        return;
    }
    if (activeTab !== 'wood') { canvas.style.cursor = 'default'; return; }
    const ctrs  = treeCenters();
    const hover = game.trees.some((tree, i) => tree.grown && hitTest(mx, my, ctrs[i], tree));
    canvas.style.cursor = hover ? 'pointer' : 'default';
});

// ═══════════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════════
const SAVE_KEY = 'woodland_save_v2';

function saveGame() {
    try {
        const data = {
            wood: game.wood,
            food: game.food,
            firstChopDone: game.firstChopDone,
            upgrades: UPGRADES.map(u => u.level),
            trees: game.trees.map(t => ({
                growth: t.growth, grown: t.grown,
                clicks: t.clicks, hasFruit: t.hasFruit,
            })),
            farm: { plots: game.farm.plots.map(p => ({ growth: p.growth, grown: p.grown })) },
            mine: {
                rockClicks: game.mine.rock.clicks,
                rockLoaded: game.mine.rock.loaded,
                rockRespawnTimer: game.mine.rock.respawnTimer,
                cartStones: game.mine.cart.stones,
                cartState: game.mine.cart.state,
                cartTimer: game.mine.cart.timer,
                cartTransportStones: game.mine.cart.transportStones,
                buddyPickAccum: game.mine.buddyPickAccum,
                buddyLoadAccum: game.mine.buddyLoadAccum,
                buddySendAccum: game.mine.buddySendAccum,
                firstLoadDone: game.mine.firstLoadDone,
            },
            stone: game.stone,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch(e) {}
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);

        if (typeof data.wood === 'number' && isFinite(data.wood))
            game.wood = data.wood;
        if (typeof data.food === 'number' && isFinite(data.food))
            game.food = data.food;
        if (typeof data.firstChopDone === 'boolean')
            game.firstChopDone = data.firstChopDone;

        if (Array.isArray(data.upgrades)) {
            data.upgrades.forEach((lvl, i) => {
                if (UPGRADES[i] && typeof lvl === 'number' && lvl >= 0 && lvl <= UPGRADES[i].maxLevel)
                    UPGRADES[i].level = lvl;
            });
        }

        if (Array.isArray(data.trees) && data.trees.length > 0) {
            game.trees = data.trees.map(t => ({
                growth:    (typeof t.growth === 'number' && isFinite(t.growth)) ? Math.max(0, Math.min(1, t.growth)) : 0,
                grown:     t.grown    === true,
                clicks:    (typeof t.clicks === 'number') ? t.clicks : 0,
                hasFruit:  t.hasFruit === true,
                shakeTimer: 0, shakeX: 0, readyPing: t.grown === true,
            }));
        }

        // Restore farm state
        if (data.farm && Array.isArray(data.farm.plots) && data.farm.plots.length > 0) {
            game.farm.plots = data.farm.plots.map(p => ({
                growth:    (typeof p.growth === 'number' && isFinite(p.growth)) ? Math.max(0, Math.min(1, p.growth)) : 0,
                grown:     p.grown === true,
                readyPing: p.grown === true,
            }));
        }

        // Restore mine state
        if (data.mine) {
            game.mine.rock.clicks          = typeof data.mine.rockClicks          === 'number' ? data.mine.rockClicks          : 0;
            game.mine.rock.loaded          = !!data.mine.rockLoaded;
            game.mine.rock.respawnTimer    = typeof data.mine.rockRespawnTimer    === 'number' ? data.mine.rockRespawnTimer    : 0;
            game.mine.cart.stones          = typeof data.mine.cartStones          === 'number' ? data.mine.cartStones          : 0;
            game.mine.cart.state           = ['idle','leaving','depositing','returning'].includes(data.mine.cartState) ? data.mine.cartState : 'idle';
            game.mine.cart.timer           = typeof data.mine.cartTimer           === 'number' ? data.mine.cartTimer           : 0;
            game.mine.cart.transportStones = typeof data.mine.cartTransportStones === 'number' ? data.mine.cartTransportStones : 0;
            if (typeof data.mine.buddyPickAccum === 'number') game.mine.buddyPickAccum = data.mine.buddyPickAccum;
            if (typeof data.mine.buddyLoadAccum === 'number') game.mine.buddyLoadAccum = data.mine.buddyLoadAccum;
            if (typeof data.mine.buddySendAccum === 'number') game.mine.buddySendAccum = data.mine.buddySendAccum;
            if (typeof data.mine.firstLoadDone === 'boolean') game.mine.firstLoadDone = data.mine.firstLoadDone;
            // Snap 'leaving' to 'depositing' on reload (animation already happened)
            if (game.mine.cart.state === 'leaving') { game.mine.cart.state = 'depositing'; game.mine.cart.timer = getCartTripTime(); game.mine.cart.travelX = 0; }
        }
        if (typeof data.stone === 'number' && isFinite(data.stone)) game.stone = data.stone;

        // Restore UI state
        if (UPGRADES[7].level > 0) {
            document.getElementById('tab-farm-btn').style.display = '';
        }
        if (UPGRADES[16].level > 0) {
            document.getElementById('tab-mine-btn').style.display = '';
        }
        if (UPGRADES[4].level > 0 || game.food > 0) {
            document.getElementById('food-hud').classList.remove('hidden');
        }
    } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  TITLE SCREEN
// ═══════════════════════════════════════════════════════════════
function hasSave() {
    try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

function eraseSave() {
    try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function resetGameState() {
    game.wood          = 0;
    game.food          = 0;
    game.firstChopDone  = false;
    game.lodgeAccum     = 0;
    game.windmillAccum  = 0;
    game.trees         = [makeTree()];
    game.farm          = { plots: [makePlot()] };
    game.mine          = makeMine();
    game.stone         = 0;
    mineSendCartBtn    = null;
    UPGRADES.forEach(u => u.level = 0);
    document.getElementById('tab-farm-btn').style.display = 'none';
    document.getElementById('tab-mine-btn').style.display = 'none';
    document.getElementById('food-hud').classList.add('hidden');
    document.getElementById('stone-hud').classList.add('hidden');
}

function matchFarmTabHeight() {
    const woodEl = document.getElementById('tab-wood');
    const h = woodEl.offsetHeight + 'px';
    document.getElementById('tab-farm').style.minHeight = h;
    document.getElementById('tab-mine').style.minHeight = h;
}

function startGame() {
    document.getElementById('title-screen').classList.add('hidden');
    buildPanel();
    const ro = new ResizeObserver(() => {
        resizeCanvas();
        requestAnimationFrame(matchFarmTabHeight);
    });
    ro.observe(canvas);
    requestAnimationFrame(() => {
        resizeCanvas();
        initClouds();
        matchFarmTabHeight();
        requestAnimationFrame(loop);
    });
}

function devUnlockMine() {
    UPGRADES[16].level = 1;
    const mineBtn = document.getElementById('tab-mine-btn');
    mineBtn.style.display = '';
    mineBtn.classList.add('new');
    for (let i = 0; i < UPGRADES.length; i++) buildCard(i);
    syncPanel();
    saveGame();
}

let devFree = false;

function devMaxAll() {
    devFree = !devFree;
    const btn = document.getElementById('dev-max-btn');
    btn.textContent = devFree ? '⚠ DEV: FREE UPGRADES (ON)' : '⚠ DEV: FREE UPGRADES';
}

function showTitleScreen() {
    const btnResume      = document.getElementById('btn-resume');
    const confirmOverlay = document.getElementById('confirm-overlay');

    if (hasSave()) {
        btnResume.classList.remove('hidden');
    } else {
        btnResume.classList.add('hidden');
    }

    btnResume.addEventListener('click', () => {
        loadGame();
        startGame();
    });

    document.getElementById('btn-new').addEventListener('click', () => {
        if (hasSave()) {
            confirmOverlay.classList.remove('hidden');
        } else {
            resetGameState();
            startGame();
        }
    });

    document.getElementById('confirm-yes').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
        eraseSave();
        resetGameState();
        startGame();
    });

    document.getElementById('confirm-no').addEventListener('click', () => {
        confirmOverlay.classList.add('hidden');
    });
}

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
showTitleScreen();
</script>
